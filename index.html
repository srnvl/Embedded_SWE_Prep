<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title> ForjaCero </title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Lexend+Deca:wght@400;500;600;700&family=Roboto+Mono:wght@400;500;600;700&display=swap" rel="stylesheet" />
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/tabler-icons.min.css" />
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    /* Monkeytype "serika dark" palette */
    --bg: #323437;
    --bg2: #2c2e31;
    --bg3: #2c2e31;
    --surface: #2c2e31;
    --surface2: #3a3c40;
    --line: rgba(209,208,197,0.12);
    --line2: rgba(209,208,197,0.22);
    --text: #d1d0c5;
    --muted: #646669;
    --faint: #565859;
    --ember: #e2b714;
    --ember2: #f0c93a;
    --ember-glow: rgba(226,183,20,0.22);
    --accent: #ca4754;
    --accent2: #d65c68;
    --accent-glow: rgba(202,71,84,0.20);
    --violet: #e2b714;
    --copper: #ca4754;
    --steel: #646669;
    --steel-dim: #4a4c50;
    --done: #e2b714;
    --done2: #f0c93a;
    --on-primary: #323437;
    --tag-bg: rgba(226,183,20,0.12);

    --font-pixel: 'Roboto Mono', ui-monospace, monospace; /* Was Roboto Mono for pixel, body and mono fonts */
    --font-display: 'Lexend Deca', system-ui, sans-serif;
    --font-body: 'Roboto Mono', ui-monospace, monospace;
    --font-mono: 'Roboto Mono', ui-monospace, monospace;

    --r: 8px;
    --r-lg: 10px;
    --notch: none;
  }

  html { scroll-behavior: smooth; }
  body { background: var(--bg); color: var(--text); font-family: var(--font-body); font-size: 15px; line-height: 1.65; min-height: 100vh; -webkit-font-smoothing: antialiased; }
  ::selection { background: var(--accent-glow); }
  ::-webkit-scrollbar { width: 10px; height: 10px; }
  ::-webkit-scrollbar-thumb { background: var(--steel-dim); border-radius: 6px; }
  ::-webkit-scrollbar-thumb:hover { background: var(--steel); }
  :focus-visible { outline: 2px solid var(--ember); outline-offset: 3px; border-radius: 4px; }

  @keyframes rise { from { opacity: 0; transform: translateY(14px); } to { opacity: 1; transform: none; } }
  @media (prefers-reduced-motion: no-preference) { .hero, #practice { animation: rise 0.45s cubic-bezier(.2,.7,.2,1) both; } }

  /* ===== HERO ===== */
  .hero { padding: 3.75rem 2.75rem 2.5rem; border-bottom: 1px solid var(--line); position: relative; overflow: hidden; }
  .hero::before { content: ''; position: absolute; top: -160px; right: -120px; width: 540px; height: 540px; background: radial-gradient(circle, rgba(255,46,151,0.16) 0%, rgba(45,244,255,0.08) 42%, transparent 70%); pointer-events: none; }
  .hero-eyebrow { font-family: var(--font-pixel); font-size: 9px; line-height: 1.7; letter-spacing: 0.04em; text-transform: uppercase; color: var(--ember); display: inline-flex; align-items: center; gap: 11px; margin-bottom: 1.3rem; text-shadow: 0 0 10px var(--ember-glow); }
  .hero-eyebrow .spark { width: 8px; height: 8px; background: var(--ember); box-shadow: 0 0 10px var(--ember-glow), 2px 2px 0 var(--accent); flex: none; }
  .hero h1 { font-family: var(--font-display); font-size: clamp(2.3rem, 5.5vw, 3.9rem); font-weight: 800; line-height: 1.0; letter-spacing: -0.03em; margin-bottom: 0.9rem; }
  .hero h1 span { background: linear-gradient(100deg, var(--ember) 5%, var(--accent) 95%); -webkit-background-clip: text; background-clip: text; -webkit-text-fill-color: transparent; color: transparent; filter: drop-shadow(0 0 14px rgba(255,46,151,0.35)); }
  .hero p { font-size: 15px; color: var(--muted); max-width: 560px; margin-bottom: 2rem; }
  .stats-row { display: flex; gap: 0.7rem; flex-wrap: wrap; margin-bottom: 1.6rem; }
  .stat { background: var(--surface); border: 1px solid var(--line); border-radius: var(--r); padding: 0.65rem 1.15rem; min-width: 84px; }
  .stat-num { font-family: var(--font-display); font-size: 1.5rem; font-weight: 700; color: var(--text); line-height: 1.1; }
  #stat-done .stat-num, .stat:last-child .stat-num { color: var(--done); }
  .stat-label { font-size: 9px; color: var(--muted); font-family: var(--font-pixel); letter-spacing: 0.02em; text-transform: uppercase; margin-top: 5px; }
  .forge-progress { display: flex; align-items: center; gap: 14px; max-width: 560px; }
  .fp-track { flex: 1; height: 8px; background: var(--surface2); border-radius: 0; overflow: hidden; border: 1px solid var(--line); }
  .fp-fill { height: 100%; width: 0; background: linear-gradient(90deg, var(--done2), var(--done)); box-shadow: 0 0 10px rgba(43,255,136,0.5); transition: width 0.5s steps(20); }
  .fp-label { font-family: var(--font-pixel); font-size: 9px; color: var(--muted); white-space: nowrap; }

  /* ===== SEARCH BAR ===== */
  .search-bar { padding: 1rem 2.75rem; border-bottom: 1px solid var(--line); display: flex; gap: 0.8rem; align-items: center; flex-wrap: wrap; position: sticky; top: 0; z-index: 10; background: rgba(15,10,31,0.9); backdrop-filter: blur(12px); }
  .search-wrap { flex: 1; min-width: 200px; display: flex; align-items: center; gap: 10px; background: var(--surface); border: 1px solid var(--line2); border-radius: var(--r); padding: 0 1rem; transition: border-color 0.15s, box-shadow 0.15s; }
  .search-wrap:focus-within { border-color: var(--ember); box-shadow: 0 0 0 3px var(--ember-glow); }
  .search-wrap i { color: var(--faint); font-size: 17px; }
  .search-wrap input { background: transparent; border: none; outline: none; color: var(--text); font-family: var(--font-mono); font-size: 13px; padding: 0.6rem 0; width: 100%; }
  .search-wrap input::placeholder { color: var(--faint); }
  .filter-pills { display: flex; gap: 6px; flex-wrap: wrap; }
  .pill { font-family: var(--font-pixel); font-size: 9px; padding: 9px 14px; border-radius: 0; clip-path: var(--notch); border: 1px solid var(--line2); background: var(--surface); color: var(--muted); cursor: pointer; transition: all 0.15s; white-space: nowrap; }
  .pill:hover { border-color: var(--ember); color: var(--ember); }
  .pill.active { background: var(--ember); border-color: var(--ember); color: var(--on-primary); box-shadow: 0 0 14px var(--ember-glow); }

  /* ===== LAYOUT ===== */
  .main { display: grid; grid-template-columns: 256px 1fr; align-items: start; }
  .sidebar { border-right: 1px solid var(--line); padding: 1.5rem 0.9rem; position: sticky; top: 60px; height: calc(100vh - 60px); overflow-y: auto; }
  .sidebar-title { font-family: var(--font-pixel); font-size: 8px; letter-spacing: 0.04em; text-transform: uppercase; color: var(--faint); padding: 0 0.9rem; margin-bottom: 1rem; }
  .cat-btn { display: flex; align-items: center; justify-content: space-between; gap: 10px; width: 100%; padding: 0.6rem 0.9rem; background: transparent; border: 1px solid transparent; border-radius: var(--r); color: var(--muted); font-family: var(--font-body); font-size: 13.5px; font-weight: 500; cursor: pointer; text-align: left; transition: all 0.13s; }
  .cat-btn:hover { color: var(--text); background: var(--surface); }
  .cat-btn.active { color: var(--text); background: var(--surface); border-color: var(--line2); }
  .cat-btn.active::before { content: ''; width: 7px; height: 7px; background: var(--ember); box-shadow: 0 0 9px var(--ember-glow); flex: none; margin-right: -2px; }
  .cat-count { font-family: var(--font-pixel); font-size: 8px; background: var(--surface2); border-radius: 6px; padding: 4px 7px; color: var(--muted); flex-shrink: 0; }
  .cat-btn.active .cat-count { background: var(--tag-bg); color: var(--ember); }

  /* ===== CONTENT ===== */
  .content { padding: 2rem 2.75rem 4rem; }
  .section { margin-bottom: 3rem; display: none; }
  .section.visible { display: block; }
  .section-header { display: flex; align-items: center; gap: 0.85rem; margin-bottom: 0.6rem; padding-bottom: 0.9rem; border-bottom: 1px solid var(--line); }
  .section-icon { width: 36px; height: 36px; border-radius: var(--r); display: flex; align-items: center; justify-content: center; font-size: 17px; flex-shrink: 0; border: 1px solid var(--line); }
  .section-header h2 { font-family: var(--font-display); font-size: 1.4rem; font-weight: 700; letter-spacing: -0.02em; }
  .section-badge { font-family: var(--font-pixel); font-size: 8px; padding: 5px 9px; border-radius: 6px; background: var(--surface2); color: var(--muted); margin-left: auto; }
  .progress-bar-wrap { display: flex; align-items: center; gap: 12px; margin-bottom: 1.2rem; }
  .progress-bar { flex: 1; height: 4px; background: var(--surface2); border-radius: 2px; overflow: hidden; }
  .progress-fill { height: 100%; background: linear-gradient(90deg, var(--done2), var(--done)); border-radius: 2px; box-shadow: 0 0 8px rgba(43,255,136,0.4); transition: width 0.3s steps(12); }
  .progress-label { font-family: var(--font-pixel); font-size: 8px; color: var(--muted); white-space: nowrap; }

  /* ===== TOPIC CARDS ===== */
  .topics-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 10px; }
  .topic-card { background: var(--surface); border: 1px solid var(--line); border-radius: var(--r); padding: 0.85rem 1.1rem; display: flex; align-items: flex-start; gap: 12px; position: relative; overflow: hidden; transition: border-color 0.15s, transform 0.12s, box-shadow 0.15s; }
  .topic-card::before { content: ''; position: absolute; left: 0; top: 0; bottom: 0; width: 3px; background: var(--ember); transform: scaleY(0); transform-origin: top; transition: transform 0.18s; }
  .topic-card:hover { border-color: var(--ember); transform: translateY(-2px); box-shadow: 0 0 18px rgba(45,244,255,0.14); }
  .topic-card:hover::before { transform: scaleY(1); box-shadow: 0 0 10px var(--ember-glow); }
  .topic-card.done { opacity: 0.6; }
  .topic-card.done::before { transform: scaleY(1); background: var(--done); box-shadow: 0 0 10px rgba(43,255,136,0.5); }
  .topic-card.done .topic-text { color: var(--muted); text-decoration: line-through; text-decoration-color: var(--steel-dim); }
  .check-box { width: 17px; height: 17px; border: 1.5px solid var(--line2); border-radius: 4px; flex-shrink: 0; margin-top: 2px; cursor: pointer; display: flex; align-items: center; justify-content: center; font-size: 10px; color: transparent; user-select: none; transition: all 0.13s; }
  .topic-card:hover .check-box { border-color: var(--ember); }
  .topic-card.done .check-box { background: var(--done); border-color: var(--done); color: #04150B; font-weight: 700; box-shadow: 0 0 10px rgba(43,255,136,0.5); }
  .topic-text { font-size: 13.5px; line-height: 1.55; color: var(--text); flex: 1; cursor: pointer; transition: color 0.13s; }
  .topic-text:hover { color: var(--ember); }
  .no-results { padding: 4rem; text-align: center; color: var(--muted); font-family: var(--font-pixel); font-size: 10px; display: none; }

  /* ===== FOOTER ===== */
  footer { border-top: 1px solid var(--line); padding: 1.4rem 2.75rem; display: flex; align-items: center; justify-content: space-between; flex-wrap: wrap; gap: 0.5rem; }
  footer span, footer a { font-family: var(--font-mono); font-size: 11px; color: var(--muted); }
  footer a { color: var(--ember); text-decoration: none; }
  footer a:hover { text-decoration: underline; }

  /* ===== PRACTICE VIEW ===== */
  #practice { display: none; padding: 2.5rem 2.75rem 4rem; max-width: 940px; }
  #app.practicing .search-bar, #app.practicing .main { display: none; }
  #app.practicing #practice { display: block; }
  .pr-back { font-family: var(--font-pixel); font-size: 9px; color: var(--muted); background: none; border: none; cursor: pointer; display: inline-flex; gap: 9px; align-items: center; margin-bottom: 1.7rem; transition: color 0.13s; }
  .pr-back:hover { color: var(--ember); }
  .pr-cat { font-family: var(--font-pixel); font-size: 9px; letter-spacing: 0.03em; text-transform: uppercase; color: var(--accent); margin-bottom: 0.9rem; text-shadow: 0 0 10px var(--accent-glow); }
  .pr-title { font-family: var(--font-display); font-size: clamp(1.7rem, 4vw, 2.5rem); font-weight: 800; letter-spacing: -0.03em; line-height: 1.06; margin-bottom: 1.3rem; }
  .pr-prompt { border: 1px solid var(--line); border-left: 3px solid var(--ember); background: var(--surface); border-radius: 0 var(--r) var(--r) 0; padding: 1rem 1.25rem; margin-bottom: 1.8rem; font-size: 14.5px; line-height: 1.65; color: var(--text); }
  .pr-prompt code { font-family: var(--font-mono); font-size: 0.85em; background: var(--bg3); padding: 1px 6px; border-radius: 4px; color: var(--ember); }

  /* forge = arcade screen */
  .forge { position: relative; overflow: hidden; background: var(--bg3); border: 1px solid var(--ember); border-radius: var(--r-lg); padding: 1.3rem 1.4rem; margin-bottom: 1.4rem; box-shadow: inset 0 0 32px rgba(45,244,255,0.07), 0 0 0 1px rgba(45,244,255,0.10); }
  .forge::before { content: ''; position: absolute; inset: 0; background: repeating-linear-gradient(0deg, rgba(45,244,255,0.05) 0, rgba(45,244,255,0.05) 1px, transparent 1px, transparent 3px); pointer-events: none; }
  .forge > * { position: relative; }
  .forge-top { display: flex; justify-content: space-between; align-items: center; margin-bottom: 1rem; }
  .forge-label { font-family: var(--font-pixel); font-size: 8px; letter-spacing: 0.03em; text-transform: uppercase; color: var(--ember2); }
  .forge-timer { font-family: var(--font-pixel); font-size: 1.25rem; color: var(--ember); text-shadow: 0 0 12px var(--ember-glow); }
  .heat-track { position: relative; height: 9px; border-radius: 0; background: rgba(255,255,255,0.06); border: 1px solid var(--line2); overflow: visible; }
  .heat-fill { position: absolute; inset: 0 100% 0 0; height: 100%; background: linear-gradient(90deg, var(--ember), var(--accent)); box-shadow: 0 0 12px var(--ember-glow); }
  .heat-fill::after { content: ''; position: absolute; right: -2px; top: 50%; width: 5px; height: 13px; background: var(--ember2); box-shadow: 0 0 10px var(--ember-glow); transform: translateY(-50%); }
  .heat-notches { position: relative; height: 14px; margin-top: 8px; }
  .heat-notches .nx { position: absolute; transform: translateX(-50%); font-family: var(--font-pixel); font-size: 8px; color: var(--faint); top: 0; transition: color 0.4s; }
  .heat-notches .nx.lit { color: var(--ember); text-shadow: 0 0 8px var(--ember-glow); }

  /* hints */
  .pr-hints { display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px; margin-bottom: 1.6rem; }
  .pr-hint { border: 1px solid var(--line2); border-radius: var(--r); padding: 0.9rem; background: var(--surface); transition: border-color 0.35s, background 0.35s, box-shadow 0.35s; }
  .pr-hint.locked { opacity: 0.72; }
  .pr-hint.unlocked { border-color: var(--ember); background: var(--tag-bg); box-shadow: 0 0 16px rgba(45,244,255,0.14); }
  .pr-hint-head { display: flex; align-items: center; gap: 9px; font-family: var(--font-pixel); font-size: 9px; color: var(--steel); margin-bottom: 0.8rem; }
  .pr-hint.unlocked .pr-hint-head { color: var(--ember); }
  .coal { width: 9px; height: 9px; border-radius: 0; background: var(--steel-dim); flex-shrink: 0; }
  .pr-hint.unlocked .coal { background: var(--ember); box-shadow: 0 0 10px var(--ember-glow); }
  .pr-hint-when { font-family: var(--font-mono); font-size: 10px; color: var(--faint); }
  .pr-hint-reveal { font-family: var(--font-pixel); font-size: 9px; color: var(--ember); border: 1px solid var(--ember); background: transparent; border-radius: 0; clip-path: var(--notch); padding: 8px 10px; width: 100%; cursor: pointer; transition: background 0.15s; }
  .pr-hint-reveal:hover { background: var(--tag-bg); }
  .pr-hint-text { font-size: 12.5px; line-height: 1.55; color: var(--text); }

  /* whiteboard */
  .pr-wb-label { font-family: var(--font-pixel); font-size: 8px; letter-spacing: 0.03em; text-transform: uppercase; color: var(--faint); margin-bottom: 0.6rem; }
  .pr-wb { width: 100%; min-height: 210px; resize: vertical; background: var(--surface); border: 1px dashed var(--line2); border-radius: var(--r); color: var(--text); font-family: var(--font-mono); font-size: 13px; line-height: 1.7; padding: 1rem; margin-bottom: 1.5rem; transition: border-color 0.15s; }
  .pr-wb:focus { outline: none; border-color: var(--ember); border-style: solid; }
  .pr-wb::placeholder { color: var(--faint); }

  /* actions + solution */
  .pr-actions { display: flex; gap: 11px; flex-wrap: wrap; margin-bottom: 1.6rem; }
  .pr-btn { font-family: var(--font-body); font-size: 13.5px; font-weight: 600; padding: 0.7rem 1.4rem; border-radius: var(--r); border: 1px solid var(--line2); background: var(--surface); color: var(--text); cursor: pointer; transition: all 0.15s; }
  .pr-btn:hover { border-color: var(--ember); }
  .pr-btn.primary { border-radius: 0; clip-path: var(--notch); background: var(--ember); border-color: var(--ember); color: var(--on-primary); }
  .pr-btn.primary:hover { background: var(--ember2); box-shadow: 0 0 16px var(--ember-glow); }
  .pr-btn.is-done { background: rgba(43,255,136,0.12); border-color: var(--done); color: var(--done2); }
  .pr-solution { display: none; }
  .pr-solution.show { display: block; }
  .pr-solution-inner { border: 1px solid var(--line); border-radius: var(--r-lg); padding: 1.2rem 1.35rem; background: var(--surface); }
  .pr-solution-inner h3 { font-family: var(--font-pixel); font-size: 11px; line-height: 1.6; color: var(--ember); margin-bottom: 1rem; }
  .pr-solution-inner pre { white-space: pre-wrap; font-family: var(--font-mono); font-size: 12.5px; line-height: 1.75; color: var(--text); }
  .pr-note { font-family: var(--font-mono); font-size: 11px; color: var(--faint); line-height: 1.7; margin-top: 1.8rem; padding-top: 1.1rem; border-top: 1px solid var(--line); }

  /* ===== CODE IDE ===== */
  .ide { margin-bottom: 1.6rem; }
  .ide-bar { display: flex; align-items: center; gap: 10px; margin-bottom: 0.7rem; flex-wrap: wrap; }
  .ide-lang { font-family: var(--font-mono); font-size: 12px; padding: 7px 11px; border: 1px solid var(--line2); border-radius: 7px; background: var(--surface); color: var(--text); cursor: pointer; }
  .ide-run { font-family: var(--font-pixel); font-size: 9px; padding: 11px 18px; border-radius: 0; clip-path: var(--notch); border: 1px solid var(--ember); background: var(--ember); color: var(--on-primary); cursor: pointer; transition: all 0.15s; }
  .ide-run:hover { background: var(--ember2); box-shadow: 0 0 16px var(--ember-glow); }
  .ide-run:disabled { opacity: 0.55; cursor: default; }
  .ide-reset { font-family: var(--font-mono); font-size: 11px; color: var(--muted); background: none; border: none; cursor: pointer; margin-left: auto; }
  .ide-reset:hover { color: var(--ember); }
  .editor-wrap { display: flex; background: var(--bg3); border: 1px solid var(--line2); border-radius: var(--r); overflow: hidden; }
  .editor-gutter { padding: 14px 10px; text-align: right; font-family: var(--font-mono); font-size: 13px; line-height: 1.6; color: #5B5388; background: rgba(0,0,0,0.3); user-select: none; min-width: 42px; overflow: hidden; white-space: pre; }
  .editor-area { flex: 1; padding: 14px; font-family: var(--font-mono); font-size: 13px; line-height: 1.6; color: #E6E2FF; background: transparent; border: none; outline: none; resize: vertical; min-height: 220px; overflow: auto; tab-size: 4; }
  .editor-area::placeholder { color: #5B5388; }
  .ide-stdin { width: 100%; font-family: var(--font-mono); font-size: 12px; padding: 9px 11px; border: 1px solid var(--line2); border-radius: 7px; background: var(--surface); color: var(--text); margin-top: 0.7rem; resize: vertical; }
  .ide-stdin::placeholder { color: var(--faint); }
  .ide-out-label { font-family: var(--font-pixel); font-size: 8px; letter-spacing: 0.03em; text-transform: uppercase; color: var(--faint); margin: 1rem 0 0.5rem; display: flex; justify-content: space-between; align-items: center; }
  .ide-out-label .st { color: var(--ember); }
  .ide-out-body { font-family: var(--font-mono); font-size: 12.5px; line-height: 1.6; white-space: pre-wrap; word-break: break-word; background: var(--bg3); color: #E6E2FF; border: 1px solid var(--line2); border-radius: var(--r); padding: 13px; min-height: 50px; max-height: 300px; overflow: auto; }
  .ide-out-body.err { color: var(--accent2); }
  .ide-note { font-family: var(--font-mono); font-size: 10.5px; color: var(--faint); margin-top: 0.6rem; line-height: 1.6; }

  /* ===== RESPONSIVE ===== */
  @media (max-width: 820px) {
    .hero { padding: 2.75rem 1.35rem 2rem; }
    .search-bar { padding: 0.85rem 1.35rem; }
    .main { grid-template-columns: 1fr; }
    .sidebar { position: static; height: auto; border-right: none; border-bottom: 1px solid var(--line); padding: 0.85rem 1rem; display: flex; flex-wrap: wrap; gap: 6px; overflow: visible; }
    .sidebar-title { display: none; }
    .cat-btn { width: auto; border: 1px solid var(--line); border-radius: 999px; padding: 0.4rem 0.85rem; font-size: 12px; }
    .cat-btn.active::before { display: none; }
    .content { padding: 1.5rem 1.35rem 3rem; }
    .topics-grid { grid-template-columns: 1fr; }
    #practice { padding: 1.75rem 1.35rem 3rem; }
    .pr-hints { grid-template-columns: 1fr; }
    footer { padding: 1.1rem 1.35rem; }
  }

  /* ===== C CONCEPTS / LESSONS ===== */
  .concepts-intro { color: var(--muted); max-width: 640px; margin-bottom: 1.6rem; }
  .lesson-cards { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 12px; }

const DATA = {
  "Linked List": {
    icon: "ti-list",
    color: "#0A8A5C",
    iconBg: "rgba(10,138,92,0.1)",
    items: [
      { text: "Determine if there is a cycle or not",
        prompt: "Given the head of a singly linked list, determine whether it contains a cycle. Aim for O(n) time and O(1) space.",
        hints: [
          "A hash set of visited nodes works but costs O(n) space. Can you detect a loop without remembering every node?",
          "Picture two runners on a circular track at different speeds — the faster one eventually laps the slower one. Apply that to pointers.",
          "Floyd's algorithm: a slow pointer moves one step, a fast pointer two. If they ever meet, there's a cycle; if fast hits null, there isn't."
        ],
        solution: "Floyd's tortoise and hare: advance slow by 1 and fast by 2 each step. If fast or fast->next becomes null, no cycle. If slow == fast, there's a cycle. O(n) time, O(1) space.\n\nFollow-up (your next topic): find the node where the cycle begins — reset one pointer to head and advance both by 1; they meet at the cycle start." },
      { text: "Return the node where a cycle begins" },
      { text: "Find the node where two linked lists intersect" },
      { text: "Remove Nth node from end of the list" },
      { text: "Reverse linked list",
        prompt: "Reverse a singly linked list and return the new head. Do it iteratively in O(n) time and O(1) space, then discuss the recursive version.",
        hints: [
          "You're re-pointing each node's next to its previous node. What do you need to remember before you overwrite a node's next pointer?",
          "Track three pointers as you walk: previous, current, and the saved next. Lose any one and you either lose the rest of the list or can't link backwards.",
          "Loop: save next = cur.next; cur.next = prev; prev = cur; cur = next. When cur is null, prev is the new head."
        ],
        solution: "Iterative, O(1) space:\n\n  Node* reverse(Node* head) {\n      Node *prev = nullptr, *cur = head;\n      while (cur) { Node* next = cur->next; cur->next = prev; prev = cur; cur = next; }\n      return prev;\n  }\n\nRecursive version reverses the rest, then fixes head->next->next = head and head->next = nullptr — O(n) stack space. Expect the follow-up to reverse in groups of K." },

  "Hashmap": {

    color: "#C0440A",
    iconBg: "rgba(192,68,10,0.1)",
    items: [
      { text: "2 Sum — return indices adding to target" },
      { text: "4 Sum" },
      { text: "Find all duplicates" },

      { text: "Isomorphic strings" },
      { text: "First unique character in a string (one pass, two pass)" },

      { text: "Valid Sudoku" },
      { text: "Longest substring without repeating characters" },
      { text: "LRU cache",
        prompt: "Design a cache with a fixed capacity supporting get(key) and put(key, value), both O(1). When full, evict the least recently used entry.",
        hints: [
          "You need two things at once: O(1) lookup by key, and O(1) knowledge of what's least recently used. One structure can't do both well — combine two.",
          "A hash map gives O(1) lookup. A doubly linked list ordered by recency gives O(1) move-to-front and O(1) eviction from the back.",
          "The map stores key -> list node. On access, unlink the node and move it to the front. On insert when full, drop the tail node and erase its key from the map."
        ],
        solution: "Hash map (key -> node) + doubly linked list ordered most-to-least recently used. get: look up node, move to front, return value. put: if present, update and move to front; else insert at front and, if over capacity, evict the tail and erase its key. Every operation is O(1).\n\nThis is the canonical 'combine two structures' problem — interviewers want to see you reach for the list to track recency." },
      { text: "Ransom Note" },
      { text: "Insert Delete GetRandom O(1)" },
      { text: "Design Hashmap" },
    ]
  },
  "Stack": {
    icon: "ti-stack-2",
    color: "#7C3ABC",
    iconBg: "rgba(124,58,188,0.1)",
    items: [
      { text: "Implement Stack using an Array" },
      { text: "Implement Stack using a Linked List" },
      { text: "Implement Queue using Stack" },
      { text: "Valid (Balanced) Parentheses" },
      { text: "Backspace String Compare" },
      { text: "Evaluate Reverse Polish Notation" },
      { text: "Min Stack" },
      { text: "Daily Temperature" },
      { text: "Decode String" },
      { text: "Asteroid Collision" },
      { text: "Basic Calculator II" },
      { text: "Trapping Rain Water" },
    ]
  },
  "Queue": {
    icon: "ti-arrows-right",
    color: "#A07A00",
    iconBg: "rgba(160,122,0,0.1)",
    items: [
      { text: "Implement Queue using an Array" },
      { text: "Implement Queue using a Linked List" },
      { text: "Implement Stack using Queue" },
      { text: "Circular (Ring) buffer",
        prompt: "Implement a fixed-capacity circular buffer for a single producer and single consumer: push returns false if full, pop returns false if empty. No dynamic allocation.",
        hints: [
          "Use a fixed array plus a head and a tail index. The hard part is telling 'completely full' from 'completely empty' — both can look like head == tail.",
          "Two common fixes: keep a separate count, or leave one slot always empty so full is (head + 1) % cap == tail. Pick one and stay consistent.",
          "With a count: push writes at head, advances head modulo capacity, increments count; pop reads at tail, advances tail, decrements count. Full is count == cap, empty is count == 0."
        ],
        solution: "Array + head + tail + count. Push at head, pop at tail; both indices wrap with modulo (or a branch, cheaper than % on small MCUs). The count disambiguates full vs empty.\n\nFollow-up: make it safe across two threads/contexts. For single-producer/single-consumer you can drop the lock if head and tail are each written by only one side, using acquire/release memory ordering — the lock-free version." },
      { text: "Design Hit Counter" },
    ]
  },
  "Sorting": {

    iconBg: "rgba(10,138,92,0.1)",
    items: [

      { text: "Merge sort" },
      { text: "Quick sort" },
    ]
  },
  "Searching": {
    icon: "ti-zoom-code",
    color: "#0771C2",
    iconBg: "rgba(7,113,194,0.1)",
    items: [
      { text: "Linear search" },
      { text: "Binary search" },
    ]
  },
  "Bit Manipulation": {
    icon: "ti-binary",
    color: "#C0440A",
    iconBg: "rgba(192,68,10,0.1)",
    items: [
      { text: "Swap bits in odd and even positions" },
      { text: "Power of 2" },
      { text: "Set, clear and toggle i'th bit" },
      { text: "Find position of the only set bit" },
      { text: "Count number of set bits in logN time",
        prompt: "Count the bits set to 1 in a 32-bit unsigned integer in time proportional to the number of set bits, not 32.",
        hints: [
          "A naive version checks each of the 32 bits with a mask and a shift. Get that working, then ask: can you skip the zero bits?",
          "There's a classic trick: n & (n - 1) clears the lowest set bit. Walk through what it does to 0b10110 on paper.",
          "Loop while (n) { count++; n &= n - 1; }. Each iteration removes exactly one set bit, so it runs once per set bit."
        ],
        solution: "Brian Kernighan's algorithm: each n &= (n - 1) clears the lowest set bit, so the loop runs once per set bit.\n\n  int popcount(uint32_t n) {\n      int c = 0;\n      while (n) { n &= (n - 1); c++; }\n      return c;\n  }\n\nMention __builtin_popcount and why a lookup table can win for batch work." },
      { text: "Add two numbers without arithmetic operators" },
      { text: "Find the only number that appears once" },
      { text: "Set all bits in a given range" },
      { text: "Compute 2's complement" },
      { text: "Position of rightmost bit set" },
      { text: "Isolate the rightmost bit set" },
      { text: "Toggle rightmost bit set" },
      { text: "Position of leftmost bit set" },
      { text: "Swap 2 numbers without a temporary variable" },
      { text: "Reverse the order of bits in a number" },
      { text: "Modify a bit at a given position to 1 or 0" },
      { text: "Missing Number" },
      { text: "Number of 1 bits" },
      { text: "Counting bits" },
      { text: "Find the duplicate number" },
    ]
  },
  "Embedded Specific": {
    icon: "ti-cpu",
    color: "#7C3ABC",
    iconBg: "rgba(124,58,188,0.12)",
    items: [
      { text: "Boot sequence",
        explanation: "<p>What runs between power-on and your <code>main()</code>.</p><ul><li><strong>Reset:</strong> the CPU starts at a fixed <em>reset vector</em> and runs code from ROM/flash.</li><li><strong>Bootloader:</strong> sets up clocks, initializes DRAM and essential peripherals, then loads the application/kernel image into RAM.</li><li><strong>C runtime startup (crt0):</strong> sets the stack pointer, copies initialized data (<code>.data</code>) to RAM, zeroes <code>.bss</code>, runs C++ constructors, then calls <code>main()</code>.</li></ul><p>On a big system it's ROM &rarr; first-stage bootloader &rarr; second-stage (U-Boot/UEFI) &rarr; OS kernel. On an MCU it's reset vector &rarr; startup code &rarr; <code>main()</code>.</p>" },
      { text: "Causes of segmentation fault and how to overcome",
        explanation: "<p>A segfault is the MMU/OS trapping an illegal memory access.</p><ul><li>Dereferencing a <code>NULL</code>, dangling (freed), or uninitialized pointer.</li><li>Array/buffer out-of-bounds access.</li><li>Writing to read-only memory (e.g. a string literal).</li><li>Stack overflow (unbounded recursion).</li></ul><p><strong>How to avoid:</strong> initialize pointers to <code>NULL</code> and set them back to <code>NULL</code> after <code>free</code>; check bounds; check every allocation; and run with <code>valgrind</code> or <code>-fsanitize=address</code> to catch it early.</p>" },
      { text: "Differences between fault, abort and trap",
        explanation: "<p>Three classes of CPU exception, distinguished by recoverability and the saved instruction pointer:</p><table><thead><tr><th>Type</th><th>Saved IP</th><th>Recoverable?</th><th>Example</th></tr></thead><tbody><tr><td>Fault</td><td>the faulting instruction (re-runnable)</td><td>usually yes</td><td>page fault</td></tr><tr><td>Trap</td><td>the next instruction</td><td>yes (intentional)</td><td>breakpoint, syscall</td></tr><tr><td>Abort</td><td>imprecise</td><td>no</td><td>machine-check / HW error</td></tr></tbody></table><p>A fault can be fixed and the instruction retried (load the page, restart). A trap is reported after the instruction (debugging, system calls). An abort is severe and unrecoverable.</p>" },
      { text: "Compiler, assembler, linker, loader",
        explanation: "<p>The toolchain stages from source to running program:</p><ul><li><strong>Compiler:</strong> high-level source &rarr; assembly (and optimizes).</li><li><strong>Assembler:</strong> assembly &rarr; machine-code object files (<code>.o</code>) with symbol tables.</li><li><strong>Linker:</strong> combines object files + libraries, resolves symbol references, lays out sections &rarr; an executable.</li><li><strong>Loader:</strong> the OS maps the executable into memory, sets up the stack/segments, and transfers control to the entry point.</li></ul><pre class=\"code\"><code>gcc -S file.c     # compile -&gt; file.s\ngcc -c file.s     # assemble -&gt; file.o\ngcc file.o -o app # link -&gt; executable\n./app             # loader runs it</code></pre>" },
      { text: "Volatile, preprocessor, pragmas, const",
        explanation: "<p>Four often-confused keywords/tools:</p><ul><li><strong><code>volatile</code></strong> tells the compiler a value can change outside normal program flow, so it must re-read it every access (no caching in a register). Essential for memory-mapped registers, ISR-shared variables, and signal flags.</li><li><strong><code>const</code></strong> is a compiler-enforced read-only promise - about intent/safety, not storage.</li><li><strong>Preprocessor</strong> does text substitution <em>before</em> compilation (<code>#define</code>, <code>#include</code>, <code>#ifdef</code>).</li><li><strong><code>#pragma</code></strong> is a compiler-specific directive, e.g. <code>#pragma pack</code>, <code>#pragma once</code>.</li></ul><pre class=\"code\"><code>// memory-mapped status register\nvolatile uint32_t *STATUS = (uint32_t*)0x40000000;\nwhile (!(*STATUS &amp; 0x1)) { }   // must re-read each loop\n\n// volatile + const = read-only, but can change in hardware\nconst volatile uint32_t *RO_REG = (uint32_t*)0x40000004;</code></pre><p class=\"note\"><code>volatile</code> gives visibility, not atomicity - a multi-byte volatile can still be read mid-update.</p>" },
      { text: "Fine-grained vs coarse-grained multithreading",
        explanation: "<p>Two hardware-multithreading strategies for hiding stalls:</p><ul><li><strong>Fine-grained:</strong> switch threads every cycle (round-robin). Hides even short stalls but needs many ready threads and slows any single thread.</li><li><strong>Coarse-grained:</strong> keep one thread running until a costly stall (e.g. a cache miss), then switch. Cheaper, but can't hide short stalls.</li></ul><p>Simultaneous multithreading (SMT/hyper-threading) goes further, issuing instructions from multiple threads in the <em>same</em> cycle.</p>" },
      { text: "Virtual memory, paging, thread vs process",
        explanation: "<p><strong>Virtual memory</strong> gives each process its own address space, translated to physical RAM by the MMU. <strong>Paging</strong> splits memory into fixed-size pages mapped via page tables; this gives isolation, and lets the system use more memory than physical RAM (swap).</p><p><strong>Process vs thread:</strong> a process has its own address space and resources; a thread is a lighter unit of execution that shares its process's address space but has its own stack and registers. Threads communicate cheaply (shared memory) but need synchronization; processes are isolated but costlier to switch.</p>" },
      { text: "Implement mutex using test-and-set, load-linked & store-conditional",
        explanation: "<p>A lock needs an <em>atomic</em> read-modify-write. Two common hardware primitives:</p><p><strong>Test-and-set (TAS):</strong> atomically write 1 and return the old value. Spin until it returns 0.</p><pre class=\"code\"><code>// atomic_flag is the portable TAS in C11\n#include &lt;stdatomic.h&gt;\natomic_flag lock = ATOMIC_FLAG_INIT;\n\nvoid acquire() { while (atomic_flag_test_and_set(&amp;lock)) { /* spin */ } }\nvoid release() { atomic_flag_clear(&amp;lock); }</code></pre><p><strong>Load-linked / store-conditional (LL/SC)</strong> (ARM <code>LDREX/STREX</code>, RISC-V <code>lr/sc</code>): LL reads and reserves an address; SC stores only if nothing wrote to it since the LL, else it fails and you retry. Enables lock-free updates without a dedicated atomic-swap instruction.</p>" },
      { text: "Mutex vs semaphore",
        explanation: "<p>Both guard shared state, but differ in ownership and purpose:</p><table><thead><tr><th></th><th>Mutex</th><th>Semaphore</th></tr></thead><tbody><tr><td>Purpose</td><td>mutual exclusion</td><td>signaling / counting</td></tr><tr><td>Ownership</td><td>yes - only the locker unlocks</td><td>no - any task can post</td></tr><tr><td>Value</td><td>locked / unlocked</td><td>counter (0..N)</td></tr></tbody></table><p>Use a <strong>mutex</strong> to protect a critical section. Use a <strong>counting semaphore</strong> to manage N identical resources, or a <strong>binary semaphore</strong> to signal between an ISR and a task. Because a mutex has ownership, RTOSes can apply priority inheritance to it; a semaphore can't.</p>" },
      { text: "Reader-writer mutex",
        explanation: "<p>A lock that allows <strong>many concurrent readers OR a single writer</strong>, never both. It boosts throughput when reads vastly outnumber writes.</p><ul><li>Multiple readers hold the lock in shared mode simultaneously.</li><li>A writer needs exclusive mode and waits for all readers to drain.</li><li>Watch for <strong>writer starvation</strong> under constant reads - pick a reader-preferring or writer-preferring policy deliberately.</li></ul>" },
      { text: "Producer-consumer problem",
        explanation: "<p>Producers put items into a bounded buffer; consumers take them out. The classic synchronization exercise.</p><p>Solve with a mutex (protect the buffer) plus two counting semaphores: <code>empty</code> (free slots, starts at N) and <code>full</code> (filled slots, starts at 0).</p><pre class=\"code\"><code>// producer\nwait(empty); lock(mtx);  enqueue(item);  unlock(mtx); post(full);\n// consumer\nwait(full);  lock(mtx);  item = dequeue(); unlock(mtx); post(empty);</code></pre><p>The semaphores make producers block when the buffer is full and consumers block when it's empty; the mutex keeps the enqueue/dequeue atomic.</p>" },
      { text: "Strict padding alignment",
        explanation: "<p>The compiler aligns each struct member to its natural boundary and pads the struct so arrays of it stay aligned. This is why <code>sizeof</code> is often larger than the sum of the members.</p><pre class=\"code\"><code>struct Bad  { char a; int b; char c; };   // 12 bytes (padding)\nstruct Good { int b; char a; char c; };   // 8 bytes</code></pre><p>Order members largest-to-smallest to minimize padding. <code>#pragma pack(1)</code> removes padding for wire/HW layouts - but unaligned access is slower and faults on some architectures.</p>" },
      { text: "Endianness - detect endianness, convert big \u2194 little endian",
        explanation: "<p><strong>Endianness</strong> is the byte order of multi-byte values. Little-endian stores the least-significant byte first (x86, most ARM); big-endian stores the most-significant first (\u201cnetwork byte order\u201d).</p><pre class=\"code\"><code>// detect\nint is_little_endian(void) {\n    uint32_t x = 1;\n    return *(char*)&amp;x == 1;\n}\n\n// swap 32-bit\nuint32_t bswap32(uint32_t v) {\n    return ((v &amp; 0xFF000000u) &gt;&gt; 24) | ((v &amp; 0x00FF0000u) &gt;&gt; 8) |\n           ((v &amp; 0x0000FF00u) &lt;&lt; 8)  | ((v &amp; 0x000000FFu) &lt;&lt; 24);\n}</code></pre><p>Use <code>htonl/ntohl</code> when sending integers over a network so both ends agree.</p>" },
      { text: "Implement memcpy, memmove, strstr, strcpy, atoi, malloc, free",
        explanation: "<p>Re-implementing libc is a favorite whiteboard task. The key subtlety: <strong><code>memcpy</code> assumes no overlap; <code>memmove</code> must handle it</strong> by copying backward when the destination is above the source.</p><pre class=\"code\"><code>void *my_memcpy(void *d, const void *s, size_t n) {\n    char *dp = d; const char *sp = s;\n    while (n--) *dp++ = *sp++;\n    return d;\n}\n\nvoid *my_memmove(void *d, const void *s, size_t n) {\n    char *dp = d; const char *sp = s;\n    if (dp &lt; sp) while (n--) *dp++ = *sp++;        // forward\n    else { dp += n; sp += n; while (n--) *--dp = *--sp; } // backward\n    return d;\n}\n\nint my_atoi(const char *s) {\n    int sign = 1, v = 0;\n    while (*s == &#x27; &#x27;) s++;\n    if (*s == &#x27;-&#x27;) { sign = -1; s++; } else if (*s == &#x27;+&#x27;) s++;\n    while (*s &gt;= &#x27;0&#x27; &amp;&amp; *s &lt;= &#x27;9&#x27;) v = v * 10 + (*s++ - &#x27;0&#x27;);\n    return sign * v;\n}</code></pre><p><code>strcpy</code> copies through the <code>\\0</code>; <code>strstr</code> scans for a substring; <code>malloc</code>/<code>free</code> manage a free list of heap blocks (see Aligned malloc for the alignment trick).</p>" },
      { text: "Aligned malloc",
        explanation: "<p>DMA engines, SIMD, and cache-line optimizations often need memory aligned to a specific boundary. Trick: over-allocate, round the pointer up to the alignment, and stash the original pointer just before it so <code>free</code> can recover it.</p><pre class=\"code\"><code>void *aligned_alloc_(size_t align, size_t size) {\n    void *raw = malloc(size + align - 1 + sizeof(void*));\n    if (!raw) return NULL;\n    uintptr_t base = (uintptr_t)raw + sizeof(void*);\n    void *aligned = (void*)((base + align - 1) &amp; ~(uintptr_t)(align - 1));\n    ((void**)aligned)[-1] = raw;       // store original\n    return aligned;\n}\nvoid aligned_free_(void *p) { if (p) free(((void**)p)[-1]); }</code></pre><p>C11 also provides <code>aligned_alloc</code> and POSIX has <code>posix_memalign</code>.</p>" },
      { text: "VIPT, TLBs, page faults",
        explanation: "<p><strong>TLB</strong> (Translation Lookaside Buffer): a small cache of recent virtual&rarr;physical page translations, so the CPU avoids a full page-table walk on every access. A TLB miss triggers a walk (or a fault).</p><p><strong>VIPT</strong> (Virtually-Indexed, Physically-Tagged) cache: index the cache with virtual address bits (fast - starts in parallel with the TLB lookup) but tag with the physical address (correct - avoids aliasing). The best of both, common for L1 caches.</p><p><strong>Page fault:</strong> the accessed page isn't currently mapped to a physical frame. A <em>minor</em> fault maps an existing page; a <em>major</em> fault loads it from disk/swap; an invalid access becomes a segfault.</p>" },
      { text: "Interrupts, exceptions, deadlocks, priority inversion and inheritance",
        explanation: "<p><strong>Interrupt</strong> = asynchronous signal from hardware; <strong>exception</strong> = synchronous event from an instruction (fault/trap). Both vector through a table to a handler.</p><p><strong>Deadlock</strong> needs all four Coffman conditions: mutual exclusion, hold-and-wait, no preemption, and circular wait - break any one to prevent it.</p><p><strong>Priority inversion:</strong> a high-priority task waits on a resource held by a low-priority task, which a medium task keeps preempting. Fix with <strong>priority inheritance</strong> (the holder temporarily inherits the waiter's priority) or a priority ceiling. The 1997 Mars Pathfinder resets were exactly this.</p>" },
      { text: "HW breakpoint vs SW breakpoint",
        explanation: "<p>Two ways a debugger stops execution:</p><ul><li><strong>Software breakpoint:</strong> the debugger replaces the target instruction with a trap (<code>INT3</code>/<code>BKPT</code>). Unlimited in number, but it modifies code - so it can't be set in ROM/flash and can't watch data.</li><li><strong>Hardware breakpoint:</strong> uses dedicated CPU debug/comparator registers. Limited in count, but works in ROM and can be a <em>watchpoint</em> that fires on data reads/writes to an address.</li></ul>" },
      { text: "SPI vs UART vs I2C",
        explanation: "<p>The three workhorse embedded serial buses:</p><table><thead><tr><th></th><th>UART</th><th>SPI</th><th>I2C</th></tr></thead><tbody><tr><td>Clock</td><td>none (async)</td><td>shared (sync)</td><td>shared (sync)</td></tr><tr><td>Wires</td><td>2 (TX/RX)</td><td>4 (MOSI/MISO/SCLK/SS)</td><td>2 (SDA/SCL)</td></tr><tr><td>Topology</td><td>point-to-point</td><td>1 master, N slaves (per-SS)</td><td>multi-master, addressed</td></tr><tr><td>Speed</td><td>low</td><td>highest, full-duplex</td><td>moderate</td></tr></tbody></table><p>UART needs matching baud rates; SPI is fastest but uses a select line per slave; I2C uses only two wires with addressing but is slower (open-drain).</p>" },
      { text: "Matrix multiplication, cache blocking, tiling, GEMM, matrix rotation",
        explanation: "<p>Naive matrix multiply is O(n\u00b3) and cache-unfriendly because it strides across rows and columns. <strong>Tiling / cache blocking</strong> splits the matrices into sub-blocks that fit in cache, reusing data while it's hot - the core idea behind optimized <strong>GEMM</strong> (general matrix multiply) in BLAS libraries.</p><pre class=\"code\"><code>// blocked multiply (block size B chosen to fit cache)\nfor (int ii = 0; ii &lt; n; ii += B)\n for (int jj = 0; jj &lt; n; jj += B)\n  for (int kk = 0; kk &lt; n; kk += B)\n   for (int i = ii; i &lt; ii+B; i++)\n    for (int j = jj; j &lt; jj+B; j++)\n     for (int k = kk; k &lt; kk+B; k++)\n      C[i][j] += A[i][k] * B[k][j];</code></pre><p>Rotating a matrix 90\u00b0 clockwise = transpose, then reverse each row (doable in place).</p>" },
      { text: "Banker's algorithm, buddy system memory allocation, inverted paging",
        explanation: "<ul><li><strong>Banker's algorithm:</strong> deadlock <em>avoidance</em>. A resource request is granted only if the system stays in a <em>safe state</em> (some ordering lets every process finish).</li><li><strong>Buddy system:</strong> an allocator that keeps free blocks in power-of-two sizes; it splits a block in half on allocation and merges \u201cbuddies\u201d back together on free. Fast coalescing, but causes internal fragmentation.</li><li><strong>Inverted page table:</strong> one entry per <em>physical</em> frame instead of per virtual page - huge space savings for large/64-bit address spaces. Lookups use a hash of (process, virtual page).</li></ul>" },
      { text: "Spinlocks, conditional variables",
        explanation: "<p><strong>Spinlock:</strong> busy-waits in a loop until the lock is free. Right for very short critical sections on multicore, or in interrupt context where you can't sleep - but it wastes CPU if held long.</p><p><strong>Condition variable:</strong> lets a thread <em>sleep</em> until a predicate becomes true, used together with a mutex. The waiter releases the mutex and blocks; a signaler calls <code>notify</code> to wake it. Avoids busy-waiting.</p><pre class=\"code\"><code>lock(mtx);\nwhile (!ready) cond_wait(&amp;cv, &amp;mtx);  // sleeps, releases mtx\n// ... use shared state ...\nunlock(mtx);\n\n// signaller:\nlock(mtx); ready = 1; cond_signal(&amp;cv); unlock(mtx);</code></pre><p class=\"note\">Always re-check the predicate in a <code>while</code> loop - spurious wakeups happen.</p>" },
      { text: "Task scheduling, thrashing, cycle stealing, race conditions",
        explanation: "<ul><li><strong>Scheduling:</strong> the policy that picks which task runs - FCFS, round-robin, priority, or EDF/rate-monotonic for real-time deadlines.</li><li><strong>Thrashing:</strong> when the working set exceeds RAM, the system spends most of its time paging in/out instead of doing work.</li><li><strong>Cycle stealing:</strong> a DMA controller borrows bus cycles from the CPU to move data without fully halting it.</li><li><strong>Race condition:</strong> the result depends on the timing of unsynchronized accesses to shared state - fix with locks or atomics.</li></ul>" },
      { text: "Queues, FIFO, Mailbox",
        explanation: "<p><strong>FIFO queue:</strong> first-in-first-out ordering; a fixed-size FIFO is usually a ring buffer. <strong>Mailbox:</strong> an RTOS inter-task primitive that passes messages (or pointers) between tasks, typically implemented as a queue of fixed-size messages with blocking send/receive.</p><p>Queues decouple producers from consumers and are the backbone of ISR-to-task hand-off: the ISR posts to a queue, a task drains it at normal priority.</p>" },
      { text: "B\u00e9l\u00e1dy's anomaly, dining philosophers problem",
        explanation: "<p><strong>B\u00e9l\u00e1dy's anomaly:</strong> with FIFO page replacement, adding <em>more</em> frames can sometimes <em>increase</em> the number of page faults - counterintuitive. It doesn't occur with \u201cstack\u201d algorithms like LRU or OPT.</p><p><strong>Dining philosophers:</strong> five philosophers, five shared forks - the classic deadlock/starvation illustration. Fixes: impose a global resource ordering (pick lower-numbered fork first), allow at most four to sit at once, or use an arbitrator/waiter.</p>" },
      { text: "Security: digital signing, hash, encryption",
        explanation: "<ul><li><strong>Hash</strong> (e.g. SHA-256): a one-way digest for <em>integrity</em> - any change to the input changes the hash.</li><li><strong>Encryption:</strong> for <em>confidentiality</em> - symmetric (AES, one shared key) or asymmetric (RSA/ECC, public/private keypair).</li><li><strong>Digital signature:</strong> hash the message, encrypt the hash with the <em>private</em> key; anyone verifies with the <em>public</em> key - proving authenticity and integrity.</li></ul><p>Secure boot relies on this: the bootloader verifies the firmware's signature against a trusted public key before running it.</p>" },
      { text: "Firmware update",
        explanation: "<p>Updating firmware safely in the field:</p><ul><li><strong>Verify before applying:</strong> check the image's signature and checksum so a corrupt or malicious image is rejected.</li><li><strong>A/B (dual-bank) partitions:</strong> write the new image to the inactive bank, then switch - if it fails to boot, roll back to the known-good bank.</li><li><strong>Atomic switch + watchdog:</strong> a watchdog/boot-counter reverts to the old image if the new one doesn't confirm a healthy boot.</li></ul><p>This avoids \u201cbricking\u201d a device if power is lost mid-update.</p>" },
      { text: "Unit testing vs integration testing",
        explanation: "<p><strong>Unit tests</strong> exercise a single function or module in isolation, using mocks/stubs for its dependencies - fast and pinpoint failures. <strong>Integration tests</strong> verify that modules work together across their interfaces (drivers, I/O, real data paths).</p><p>The test pyramid: many fast unit tests at the base, fewer integration tests above, and a small number of end-to-end tests on top.</p>" },
      { text: "RTOS vs bare metal",
        explanation: "<p><strong>Bare metal:</strong> a super-loop plus interrupt handlers, no scheduler. Simple, tiny footprint, and easy to reason about for small deterministic apps.</p><p><strong>RTOS:</strong> a preemptive scheduler with tasks, priorities, and services (queues, semaphores, timers). Needed when you have multiple concurrent activities with real-time deadlines - at the cost of memory and complexity.</p><p>Rule of thumb: a handful of simple periodic jobs &rarr; bare metal; many interacting tasks with timing requirements &rarr; RTOS.</p>" },
      { text: "HW timer: build a SW timer API from a HW timer",
        explanation: "<p>A single hardware timer interrupt (a periodic <em>tick</em>) can drive any number of software timers. Keep a list of active timers; on each tick, advance time and fire the ones that expired.</p><pre class=\"code\"><code>typedef struct { uint32_t expiry; void (*cb)(void*); void *arg; int active; } sw_timer;\nstatic volatile uint32_t ticks;\n\nvoid hw_tick_isr(void) {            // fires every 1 ms\n    ticks++;\n    for (int i = 0; i &lt; N; i++)\n        if (timers[i].active &amp;&amp; ticks &gt;= timers[i].expiry) {\n            timers[i].active = 0;\n            timers[i].cb(timers[i].arg);\n        }\n}\nvoid start_timer(int i, uint32_t ms, void(*cb)(void*), void*a) {\n    timers[i] = (sw_timer){ ticks + ms, cb, a, 1 };\n}</code></pre><p>For many timers, a min-heap or a delta list keyed by expiry is more efficient than scanning every tick.</p>" },
      { text: "Function pointers and callbacks",
        explanation: "<p>A function pointer stores the address of a function, so behavior can be chosen at runtime - the foundation of callbacks, dispatch tables, and hardware abstraction layers (ISR vectors, driver ops).</p><pre class=\"code\"><code>typedef void (*event_cb)(int);\n\nvoid on_button(int id) { /* handle */ }\n\nvoid register_handler(event_cb cb);   // store it\n// later, the framework calls cb(id) when the event fires\nregister_handler(on_button);</code></pre><p>In an RTOS/HAL you'll see arrays of function pointers used as jump tables for interrupt vectors and pluggable driver operations.</p>" }
    ]
  },
  "C++": {
    icon: "ti-code",
    color: "#A07A00",
    iconBg: "rgba(160,122,0,0.1)",
    items: [
      { text: "new and delete operators",
        explanation: "<p><code>new</code> allocates an object on the heap <strong>and runs its constructor</strong>; <code>delete</code> runs the destructor <strong>and</strong> frees it. This is the key difference from C\u2019s <code>malloc</code>/<code>free</code>, which only move raw bytes and know nothing about constructors or destructors.</p><pre class=\"code\"><code>int *p   = new int(42);     // allocate + initialize\ndelete p;                   // free one object\n\nint *arr = new int[10];     // allocate an array\ndelete[] arr;               // MUST use delete[] for arrays</code></pre><ul><li><code>new[]</code> pairs with <code>delete[]</code>; mixing them is undefined behavior.</li><li>Every <code>new</code> needs exactly one matching <code>delete</code>, or you leak.</li><li>In modern C++ you rarely call these directly - prefer <code>std::vector</code> and smart pointers (RAII), which free automatically.</li></ul>" },
      { text: "OOP theory - abstraction, inheritance, polymorphism, encapsulation",
        explanation: "<p>The four pillars of object-oriented programming:</p><ul><li><strong>Encapsulation</strong> - bundle data with the methods that operate on it, and hide internals behind <code>private</code>/<code>public</code>.</li><li><strong>Abstraction</strong> - expose <em>what</em> an object does, hide <em>how</em> (often via abstract interfaces).</li><li><strong>Inheritance</strong> - a derived class reuses and extends a base class (<code>is-a</code>).</li><li><strong>Polymorphism</strong> - the same call behaves differently depending on the actual object type (via <code>virtual</code> functions).</li></ul><pre class=\"code\"><code>class Shape {                 // abstraction + encapsulation\npublic:\n    virtual double area() const = 0;   // polymorphism (pure virtual)\n    virtual ~Shape() = default;\n};\n\nclass Circle : public Shape {        // inheritance\n    double r;\npublic:\n    Circle(double r) : r(r) {}\n    double area() const override { return 3.14159 * r * r; }\n};</code></pre>" },
      { text: "Inline functions",
        explanation: "<p>The <code>inline</code> keyword <em>suggests</em> the compiler replace a call with the function body, avoiding call overhead for tiny functions. The compiler is free to ignore it.</p><pre class=\"code\"><code>inline int square(int x) { return x * x; }</code></pre><ul><li>Best for small, hot functions; inlining large ones causes <strong>code bloat</strong>.</li><li>Its other real job: <code>inline</code> lets you define a function in a header included by many translation units without a multiple-definition linker error.</li><li>Member functions defined inside the class body are implicitly inline.</li></ul>" },
      { text: "Virtual functions, vptr and vtable",
        explanation: "<p>A <code>virtual</code> function is resolved at <strong>runtime</strong> based on the object\u2019s actual type - the mechanism behind polymorphism.</p><p>Under the hood: each class with virtual functions has a <strong>vtable</strong> (a table of function pointers). Each object of that class stores a hidden <strong>vptr</strong> pointing to its class\u2019s vtable. A virtual call follows the vptr to the vtable and dispatches to the right override.</p><pre class=\"code\"><code>struct Base { virtual void f() { puts(&quot;Base&quot;); } virtual ~Base() = default; };\nstruct Derived : Base { void f() override { puts(&quot;Derived&quot;); } };\n\nBase *b = new Derived();\nb-&gt;f();        // &quot;Derived&quot;  -- resolved via vptr/vtable at runtime\ndelete b;      // virtual destructor ensures Derived::~Derived runs</code></pre><p class=\"note\">Always give a polymorphic base class a <strong>virtual destructor</strong>, or deleting through a base pointer leaks the derived part.</p>" },
      { text: "Friend class and function",
        explanation: "<p>A <code>friend</code> can access the <code>private</code> and <code>protected</code> members of the class that grants the friendship. Used for tightly-coupled helpers (e.g. operator overloads that need internals).</p><pre class=\"code\"><code>class Account {\n    double balance;\n    friend void audit(const Account&amp;);   // friend function\n    friend class Bank;                   // friend class\n};\n\nvoid audit(const Account &amp;a) { /* can read a.balance */ }</code></pre><ul><li>Friendship is <strong>not inherited</strong> and <strong>not transitive</strong> (a friend of a friend isn\u2019t a friend).</li><li>It breaks encapsulation, so use it sparingly - a common interview point.</li></ul>" },
      { text: "Virtual base class, abstract class",
        explanation: "<p><strong>Abstract class</strong>: has at least one pure virtual function (<code>= 0</code>); it cannot be instantiated and defines an interface.</p><pre class=\"code\"><code>class Stream {\npublic:\n    virtual void write(const char*) = 0;  // pure virtual -&gt; abstract\n    virtual ~Stream() = default;\n};\n// Stream s;          // ERROR: abstract\n</code></pre><p><strong>Virtual base class</strong>: solves the <em>diamond problem</em>. With <code>virtual</code> inheritance, the shared base appears <strong>once</strong> instead of being duplicated.</p><pre class=\"code\"><code>struct A { int x; };\nstruct B : virtual A {};\nstruct C : virtual A {};\nstruct D : B, C {};      // one shared A, not two\nD d; d.x = 5;            // unambiguous</code></pre>" },
      { text: "Function pointers",
        explanation: "<p>A pointer that stores the address of a function, enabling callbacks and runtime selection of behavior.</p><pre class=\"code\"><code>int add(int a, int b) { return a + b; }\n\nint (*op)(int, int) = add;   // declare + assign\nop(3, 4);                    // 7\n</code></pre><p>In modern C++ prefer <code>std::function</code> and lambdas, which also capture state:</p><pre class=\"code\"><code>#include &lt;functional&gt;\nstd::function&lt;int(int,int)&gt; f = [](int a, int b){ return a * b; };\nf(3, 4);   // 12</code></pre>" },
      { text: "Templates, template specialization, object slicing",
        explanation: "<p><strong>Templates</strong> generate code for any type - the basis of generic programming and the STL.</p><pre class=\"code\"><code>template &lt;typename T&gt;\nT max(T a, T b) { return (a &gt; b) ? a : b; }\nmax(3, 7);        // int\nmax(2.5, 1.5);    // double</code></pre><p><strong>Specialization</strong> provides a custom implementation for a specific type:</p><pre class=\"code\"><code>template &lt;&gt; const char* max&lt;const char*&gt;(const char* a, const char* b) {\n    return strcmp(a, b) &gt; 0 ? a : b;   // compare strings, not pointers\n}</code></pre><p><strong>Object slicing</strong>: assigning a derived object to a base <em>by value</em> copies only the base part - the derived data and vtable are \u201csliced\u201d off.</p><pre class=\"code\"><code>Derived d;\nBase b = d;     // SLICED: only the Base sub-object is copied\n// Pass/store by reference or pointer (Base&amp;) to keep polymorphism.</code></pre>" },
      { text: "Deep vs shallow copy",
        explanation: "<p>A <strong>shallow copy</strong> duplicates pointer values, so two objects share the same underlying buffer - freeing one leaves the other dangling (and you double-free). A <strong>deep copy</strong> duplicates the pointed-to data so each object owns its own.</p><pre class=\"code\"><code>class Buf {\n    int *data; int n;\npublic:\n    Buf(int n) : data(new int[n]), n(n) {}\n    // Deep copy constructor:\n    Buf(const Buf &amp;o) : data(new int[o.n]), n(o.n) {\n        for (int i = 0; i &lt; n; i++) data[i] = o.data[i];\n    }\n    ~Buf() { delete[] data; }\n};</code></pre><p class=\"note\">The compiler-generated copy is shallow. If your class owns a raw resource, write a deep copy (see the Rule of Three).</p>" },
      { text: "Copy constructors, constructor vs destructor",
        explanation: "<p>A <strong>constructor</strong> initializes an object; a <strong>destructor</strong> (<code>~T()</code>) releases its resources when it goes out of scope. A <strong>copy constructor</strong> <code>T(const T&)</code> builds a new object from an existing one.</p><pre class=\"code\"><code>class T {\npublic:\n    T()              { /* construct */ }\n    T(const T &amp;o)    { /* copy from o */ }   // copy constructor\n    ~T()             { /* destruct  */ }\n};\n\nT a;\nT b = a;     // copy constructor\nT c(a);      // copy constructor</code></pre><p class=\"note\"><strong>Rule of Three:</strong> if you need a custom destructor, copy constructor, or copy-assignment operator, you almost certainly need all three (Rule of Five in modern C++ adds move operations).</p>" },
      { text: "Overloading vs overriding operators",
        explanation: "<p>These sound alike but are different mechanisms:</p><ul><li><strong>Overloading</strong> - multiple functions share a name but differ in parameters; resolved at <strong>compile time</strong>. Operator overloading is a special case.</li><li><strong>Overriding</strong> - a derived class redefines a <code>virtual</code> function from its base; resolved at <strong>runtime</strong>.</li></ul><pre class=\"code\"><code>// Overloading an operator\nstruct Vec {\n    int x, y;\n    Vec operator+(const Vec &amp;o) const { return {x + o.x, y + o.y}; }\n};\n\n// Overriding a virtual\nstruct Base    { virtual void f(); };\nstruct Derived : Base { void f() override; };   // overrides</code></pre>" },
      { text: "Different types of casting",
        explanation: "<p>C++ has four named casts - prefer them over C-style casts because they\u2019re explicit and searchable.</p><ul><li><code>static_cast</code> - well-defined conversions (numeric, up/down-casts you know are safe).</li><li><code>dynamic_cast</code> - safe down-cast in a polymorphic hierarchy; returns <code>nullptr</code> (pointers) or throws (references) if wrong.</li><li><code>const_cast</code> - add/remove <code>const</code>.</li><li><code>reinterpret_cast</code> - low-level bit reinterpretation; dangerous, rarely needed.</li></ul><pre class=\"code\"><code>double d = 3.9;\nint i = static_cast&lt;int&gt;(d);          // 3\n\nBase *b = new Derived();\nDerived *dp = dynamic_cast&lt;Derived*&gt;(b);   // safe down-cast or nullptr\n\nconst int x = 5;\nint *px = const_cast&lt;int*&gt;(&amp;x);       // remove const (use with care)</code></pre>" },
      { text: "Static keyword, static functions",
        explanation: "<p><code>static</code> means different things by context:</p><ul><li><strong>Static local variable</strong> - keeps its value between calls, initialized once.</li><li><strong>Static member variable</strong> - one copy shared by all instances of the class.</li><li><strong>Static member function</strong> - belongs to the class, has no <code>this</code>, can only touch static members.</li><li><strong>Static free function/global</strong> - internal linkage: visible only within its translation unit.</li></ul><pre class=\"code\"><code>void counter() {\n    static int n = 0;   // persists across calls\n    n++;\n}\n\nstruct Widget {\n    static int count;            // shared by all Widgets\n    static int howMany() { return count; }  // no &#x27;this&#x27;\n};\nint Widget::count = 0;          // define the static member</code></pre>" },
      { text: "Pointers vs references",
        explanation: "<p>Both let you refer to another object, but they behave differently:</p><table><thead><tr><th></th><th>Pointer</th><th>Reference</th></tr></thead><tbody><tr><td>Can be null</td><td>yes</td><td>no</td></tr><tr><td>Reassignable</td><td>yes</td><td>no (bound once)</td></tr><tr><td>Must initialize</td><td>no</td><td>yes</td></tr><tr><td>Arithmetic</td><td>yes</td><td>no</td></tr><tr><td>Syntax</td><td><code>*p</code>, <code>p-&gt;m</code></td><td>like the object itself</td></tr></tbody></table><pre class=\"code\"><code>int x = 5, y = 9;\nint *p = &amp;x;   p = &amp;y;   // pointer can be re-pointed\nint &amp;r = x;    r = y;    // assigns 9 INTO x; r still refers to x</code></pre><p>Rule of thumb: use a reference when it must always refer to a valid object; use a pointer when it can be null or needs to be reseated.</p>" },
      { text: "lvalue and rvalue",
        explanation: "<p>An <strong>lvalue</strong> has a name/identity and a stable address (you can take <code>&amp;</code> of it). An <strong>rvalue</strong> is a temporary with no persistent identity.</p><pre class=\"code\"><code>int x = 10;     // x is an lvalue, 10 is an rvalue\nint *p = &amp;x;    // OK -- lvalue has an address\n// int *q = &amp;10; // ERROR -- rvalue has none</code></pre><p>An <strong>rvalue reference</strong> <code>T&amp;&amp;</code> binds to temporaries and powers <strong>move semantics</strong> - stealing resources from a soon-to-die object instead of copying them.</p><pre class=\"code\"><code>std::string a = &quot;hello&quot;;\nstd::string b = std::move(a);   // move: b takes a&#x27;s buffer, no deep copy\n// a is now in a valid-but-unspecified state</code></pre>" },
      { text: "Smart pointers",
        explanation: "<p>Smart pointers are RAII wrappers that own heap memory and free it automatically when they go out of scope - eliminating most manual <code>delete</code> and leaks.</p><ul><li><code>std::unique_ptr</code> - sole ownership, cannot be copied (only moved). Zero overhead.</li><li><code>std::shared_ptr</code> - shared ownership via a reference count; freed when the last owner dies.</li><li><code>std::weak_ptr</code> - a non-owning observer of a <code>shared_ptr</code>, used to break reference cycles.</li></ul><pre class=\"code\"><code>#include &lt;memory&gt;\n\nauto u = std::make_unique&lt;int&gt;(42);     // unique ownership\nauto s = std::make_shared&lt;int&gt;(7);      // ref-counted\nstd::weak_ptr&lt;int&gt; w = s;               // observes without owning\n\n// No delete needed -- freed automatically (RAII)</code></pre><p class=\"note\">Prefer <code>make_unique</code>/<code>make_shared</code> over raw <code>new</code>. Two <code>shared_ptr</code>s pointing at each other leak - break the cycle with a <code>weak_ptr</code>.</p>" }
    ]
  }
};
