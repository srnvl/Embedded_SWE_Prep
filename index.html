const CONCEPTS = [
  { id: 'structs-pointers',
    title: 'Structs &amp; Pointers in C',
    blurb: 'Beginner to expert: the mental model, memory layout, dynamic allocation, linked lists, opaque pointers, and the bugs interviewers probe.',
    html: "<p>Two foundational C topics, built up layer by layer - the mental models, how they sit in memory, the dynamic-allocation rules interviewers love, and the patterns (and bugs) that come up again and again.</p>\n<h2>Part 1 \u00b7 Pointers</h2>\n<h3>1.1 - What is a pointer?</h3>\n<p>Every variable lives somewhere in memory. Memory is a long street of numbered houses - each house is a byte, and its number is an address. <strong>A pointer is just a variable that stores an address.</strong></p>\n<pre class=\"code\"><code>int x = 42;     // x lives at some address, say 0x100, and holds 42\nint *p = &amp;x;    // p holds the value 0x100 (the address of x)</code></pre>\n<p>Three operators to internalize:</p>\n<table><thead><tr><th>Operator</th><th>Name</th><th>Meaning</th></tr></thead><tbody><tr><td><code>&amp;</code></td><td>Address-of</td><td>Give me the address of this variable</td></tr><tr><td><code>*</code> (in a declaration)</td><td>Pointer type</td><td>This variable holds an address</td></tr><tr><td><code>*</code> (on a pointer)</td><td>Dereference</td><td>Go to the address and read the value there</td></tr></tbody></table>\n<pre class=\"code\"><code>#include &lt;stdio.h&gt;\n\nint main() {\n    int x = 42;\n    int *p = &amp;x;\n\n    printf(&quot;Value of x:     %d\\n&quot;, x);    // 42\n    printf(&quot;Address of x:   %p\\n&quot;, &amp;x);   // 0x...\n    printf(&quot;Value of p:     %p\\n&quot;, p);    // same address\n    printf(&quot;Dereferenced p: %d\\n&quot;, *p);   // 42\n\n    *p = 100;   // change x through the pointer\n    printf(&quot;x is now:       %d\\n&quot;, x);    // 100\n}</code></pre>\n<p class=\"note\">Mental model: <code>p</code> is a signpost. <code>&amp;x</code> writes an address on the signpost. <code>*p</code> says \"follow the signpost and look at what is there.\"</p>\n<h3>1.2 - Why do pointers exist?</h3>\n<ul><li><strong>Pass by reference</strong> - modify a caller variable inside a function.</li><li><strong>Dynamic memory</strong> - allocate at runtime.</li><li><strong>Efficiency</strong> - pass large data without copying it.</li><li><strong>Data structures</strong> - linked lists, trees, graphs.</li><li><strong>Low-level control</strong> - hardware, OS kernels, embedded systems.</li></ul>\n<h3>1.3 - Pointer types &amp; sizes</h3>\n<p>A pointer\u2019s type tells the compiler how many bytes to read when dereferencing. The pointer itself is always the same size (8 bytes on a 64-bit system).</p>\n<pre class=\"code\"><code>char   *cp;   // dereference reads 1 byte\nint    *ip;   // dereference reads 4 bytes\ndouble *dp;   // dereference reads 8 bytes</code></pre>\n<div class=\"callout\"><h4>Exercises - Level 1 (Beginner)</h4><ol><li>Write <code>swap(int *a, int *b)</code> that swaps two integers. Test it in <code>main</code>.</li><li>Write <code>increment(int *n)</code> that adds 1 to a number. Print before and after.</li><li>Declare an int, a pointer to it, and a pointer to that pointer (double pointer). Print the value using <code>**</code>.</li></ol></div>\n<details><summary>Show solutions</summary>\n<pre class=\"code\"><code>// 1\nvoid swap(int *a, int *b) {\n    int temp = *a;\n    *a = *b;\n    *b = temp;\n}\n\n// 2\nvoid increment(int *n) { (*n)++; }\n\n// 3\nint x = 5;\nint *p = &amp;x;\nint **pp = &amp;p;\nprintf(&quot;%d\\n&quot;, **pp);  // 5</code></pre>\n</details>\n<h3>1.4 - Pointers and arrays</h3>\n<p>In C, the array name <em>decays</em> to a pointer to its first element.</p>\n<pre class=\"code\"><code>int arr[5] = {10, 20, 30, 40, 50};\nint *p = arr;          // same as &amp;arr[0]\n\nprintf(&quot;%d\\n&quot;, arr[2]);     // 30\nprintf(&quot;%d\\n&quot;, *(p + 2));   // 30  -- pointer arithmetic\nprintf(&quot;%d\\n&quot;, p[2]);       // 30  -- same thing</code></pre>\n<p>Pointer arithmetic moves by the size of the type: <code>p + 1</code> on an <code>int*</code> moves 4 bytes; on a <code>double*</code> it moves 8.</p>\n<pre class=\"code\"><code>// Iterating an array with a pointer\nfor (int *p = arr; p &lt; arr + 5; p++) {\n    printf(&quot;%d &quot;, *p);\n}</code></pre>\n<h3>1.5 - Pointers and functions</h3>\n<pre class=\"code\"><code>// Value is copied -- original unchanged\nvoid fail(int x) { x = 99; }\n\n// Pointer -- we modify the original\nvoid succeed(int *x) { *x = 99; }\n\n// Returning a pointer to the caller&#x27;s variable -- OK\nint* safe(int *x) { (*x)++; return x; }\n\n// DANGER -- never do this:\nint* dangerous() {\n    int local = 5;\n    return &amp;local;   // local is destroyed when the function returns!\n}</code></pre>\n<h3>1.6 - Dynamic memory: malloc, calloc, realloc, free</h3>\n<p>The stack is automatic but limited. The heap lets you allocate at runtime.</p>\n<pre class=\"code\"><code>#include &lt;stdlib.h&gt;\n\n// malloc -- raw bytes, uninitialized\nint *p = malloc(sizeof(int));\n*p = 42;\nfree(p);\n\n// calloc -- allocates and zeroes\nint *arr = calloc(10, sizeof(int));   // 10 ints, all zero\nfree(arr);\n\n// realloc -- resize an allocation\nint *buf = malloc(5 * sizeof(int));\nbuf = realloc(buf, 10 * sizeof(int)); // grow to 10 ints\nfree(buf);</code></pre>\n<p>The golden rules:</p><ul><li>Always check whether <code>malloc</code> returned <code>NULL</code>.</li><li>Every <code>malloc</code> has exactly one <code>free</code>.</li><li>Never use memory after <code>free</code> (use-after-free).</li><li>Never <code>free</code> the same pointer twice (double-free).</li><li>Never return a pointer to a stack variable.</li></ul>\n<pre class=\"code\"><code>int *safe_alloc(int n) {\n    int *p = malloc(n * sizeof(int));\n    if (p == NULL) {\n        fprintf(stderr, &quot;Allocation failed!\\n&quot;);\n        exit(1);\n    }\n    return p;\n}</code></pre>\n<div class=\"callout\"><h4>Exercises - Level 2 (Intermediate)</h4><ol><li><code>int* create_array(int n)</code> - allocate an array of n ints, fill with 1..n, return it. Print and free in main.</li><li><code>reverse(int *arr, int n)</code> - reverse in place using pointer arithmetic (no <code>[]</code>).</li><li><code>char* my_strdup(const char *s)</code> - allocate, copy the string, return it.</li></ol></div>\n<details><summary>Show solutions</summary>\n<pre class=\"code\"><code>// 1\nint* create_array(int n) {\n    int *arr = malloc(n * sizeof(int));\n    if (!arr) exit(1);\n    for (int i = 0; i &lt; n; i++) arr[i] = i + 1;\n    return arr;\n}\n\n// 2\nvoid reverse(int *arr, int n) {\n    int *left = arr, *right = arr + n - 1;\n    while (left &lt; right) {\n        int temp = *left;\n        *left++ = *right;\n        *right-- = temp;\n    }\n}\n\n// 3\nchar* my_strdup(const char *s) {\n    int len = 0;\n    while (s[len]) len++;\n    char *copy = malloc(len + 1);\n    if (!copy) exit(1);\n    for (int i = 0; i &lt;= len; i++) copy[i] = s[i];\n    return copy;\n}</code></pre>\n</details>\n<h3>1.7 - Function pointers</h3>\n<p>Functions live in memory too. You can point to them, store them, and pass them.</p>\n<pre class=\"code\"><code>// Syntax: returntype (*name)(param_types)\nint add(int a, int b) { return a + b; }\nint mul(int a, int b) { return a * b; }\n\nint main() {\n    int (*op)(int, int);   // pointer to a function (2 ints -&gt; int)\n    op = add; printf(&quot;%d\\n&quot;, op(3, 4));  // 7\n    op = mul; printf(&quot;%d\\n&quot;, op(3, 4));  // 12\n}</code></pre>\n<p>The practical use is callbacks - this is exactly how <code>qsort</code> works:</p>\n<pre class=\"code\"><code>void apply(int *arr, int n, int (*fn)(int)) {\n    for (int i = 0; i &lt; n; i++)\n        arr[i] = fn(arr[i]);\n}\n\nint square(int x) { return x * x; }\nint negate(int x) { return -x; }\n// apply(arr, 5, square);</code></pre>\n<h3>1.8 - The void* pointer</h3>\n<p><code>void*</code> can hold any address but can\u2019t be dereferenced without casting. It\u2019s how C writes generic code.</p>\n<pre class=\"code\"><code>void print_bytes(void *ptr, int n) {\n    unsigned char *p = (unsigned char *)ptr;\n    for (int i = 0; i &lt; n; i++)\n        printf(&quot;%02X &quot;, p[i]);\n    printf(&quot;\\n&quot;);\n}\n\nint x = 0xDEADBEEF;\nprint_bytes(&amp;x, sizeof(x));</code></pre>\n<h2>Part 2 \u00b7 Structs</h2>\n<h3>2.1 - What is a struct?</h3>\n<p>A struct groups related variables under one name - a custom type.</p>\n<pre class=\"code\"><code>struct Point {\n    int x;\n    int y;\n};\n\nint main() {\n    struct Point p;             // declare\n    p.x = 10;                  // dot operator\n    p.y = 20;\n    struct Point q = {5, 15};  // initialize\n    printf(&quot;(%d, %d)\\n&quot;, p.x, p.y);\n}</code></pre>\n<p><code>typedef</code> avoids writing <code>struct</code> every time:</p>\n<pre class=\"code\"><code>typedef struct {\n    int x;\n    int y;\n} Point;\n\nPoint p = {10, 20};   // cleaner</code></pre>\n<h3>2.2 - Structs in memory (padding)</h3>\n<p>Members are laid out in order, but the compiler inserts <strong>padding</strong> for alignment.</p>\n<pre class=\"code\"><code>typedef struct {\n    char   a;   // 1 byte\n    // 3 bytes padding\n    int    b;   // 4 bytes\n    char   c;   // 1 byte\n    // 7 bytes padding\n    double d;   // 8 bytes\n} Padded;       // likely 24 bytes, not 14\n\nprintf(&quot;%zu\\n&quot;, sizeof(Padded));  // probably 24</code></pre>\n<p>Order members largest-to-smallest to minimize padding.</p>\n<h3>2.3 - Pointers to structs (the arrow operator)</h3>\n<pre class=\"code\"><code>Point p = {10, 20};\nPoint *ptr = &amp;p;\n\nprintf(&quot;%d\\n&quot;, (*ptr).x);  // dereference then dot\nprintf(&quot;%d\\n&quot;, ptr-&gt;x);    // arrow operator (preferred)\n\nptr-&gt;x = 99;               // modify through the pointer</code></pre>\n<h3>2.4 - Passing structs to functions</h3>\n<pre class=\"code\"><code>typedef struct { float x, y, z; } Vec3;\n\n// BAD for large structs -- copies the whole thing\nfloat length_copy(Vec3 v) {\n    return sqrt(v.x*v.x + v.y*v.y + v.z*v.z);\n}\n\n// BETTER -- pass by pointer (no copy)\nfloat length_ptr(const Vec3 *v) {\n    return sqrt(v-&gt;x*v-&gt;x + v-&gt;y*v-&gt;y + v-&gt;z*v-&gt;z);\n}\n\n// Returning a small struct is fine\nVec3 add(const Vec3 *a, const Vec3 *b) {\n    return (Vec3){a-&gt;x + b-&gt;x, a-&gt;y + b-&gt;y, a-&gt;z + b-&gt;z};\n}</code></pre>\n<p>Use <code>const Vec3 *</code> when you won\u2019t modify - it documents intent and prevents bugs.</p>\n<div class=\"callout\"><h4>Exercises - Level 3 (Intermediate-Advanced)</h4><ol><li><code>Rectangle</code> with width/height; write <code>area</code> and <code>perimeter</code> taking <code>const Rectangle *</code>.</li><li><code>Student</code> with <code>name[50]</code>, <code>grade</code>, <code>id</code>; return a pointer to the highest-grade student in an array.</li><li>Allocate 5 <code>Student</code>s, fill them, sort by grade with <code>qsort</code> + a comparator, print them.</li></ol></div>\n<details><summary>Show solutions</summary>\n<pre class=\"code\"><code>// 1\ntypedef struct { float width, height; } Rectangle;\nfloat area(const Rectangle *r)      { return r-&gt;width * r-&gt;height; }\nfloat perimeter(const Rectangle *r) { return 2 * (r-&gt;width + r-&gt;height); }\n\n// 2\ntypedef struct { char name[50]; float grade; int id; } Student;\nStudent* top_student(Student *arr, int n) {\n    Student *top = &amp;arr[0];\n    for (int i = 1; i &lt; n; i++)\n        if (arr[i].grade &gt; top-&gt;grade) top = &amp;arr[i];\n    return top;\n}\n\n// 3\nint cmp_grade(const void *a, const void *b) {\n    const Student *sa = a, *sb = b;\n    return (sa-&gt;grade &lt; sb-&gt;grade) - (sa-&gt;grade &gt; sb-&gt;grade); // descending\n}\n// qsort(students, 5, sizeof(Student), cmp_grade);</code></pre>\n</details>\n<h2>Part 3 \u00b7 Combining structs &amp; pointers</h2>\n<h3>3.1 - Linked lists</h3>\n<p>The classic structure that needs both - a self-referential struct.</p>\n<pre class=\"code\"><code>typedef struct Node {\n    int data;\n    struct Node *next;   // pointer to the same type\n} Node;\n\nNode* new_node(int val) {\n    Node *n = malloc(sizeof(Node));\n    n-&gt;data = val;\n    n-&gt;next = NULL;\n    return n;\n}\n\nNode* prepend(Node *head, int val) {\n    Node *n = new_node(val);\n    n-&gt;next = head;\n    return n;\n}\n\nvoid print_list(Node *head) {\n    while (head) { printf(&quot;%d -&gt; &quot;, head-&gt;data); head = head-&gt;next; }\n    printf(&quot;NULL\\n&quot;);\n}\n\nvoid free_list(Node *head) {\n    while (head) { Node *t = head; head = head-&gt;next; free(t); }\n}</code></pre>\n<h3>3.2 - Pointer-to-pointer for list modification</h3>\n<p>Using <code>Node**</code> lets a function modify the head pointer itself - and removes the special case for deleting the first node.</p>\n<pre class=\"code\"><code>void append(Node **head, int val) {\n    Node *n = new_node(val);\n    if (!*head) { *head = n; return; }\n    Node *curr = *head;\n    while (curr-&gt;next) curr = curr-&gt;next;\n    curr-&gt;next = n;\n}\n\nvoid delete_val(Node **head, int val) {\n    Node **curr = head;\n    while (*curr) {\n        if ((*curr)-&gt;data == val) {\n            Node *tmp = *curr;\n            *curr = (*curr)-&gt;next;\n            free(tmp);\n            return;\n        }\n        curr = &amp;(*curr)-&gt;next;\n    }\n}</code></pre>\n<h3>3.3 - Nested &amp; complex structures</h3>\n<pre class=\"code\"><code>typedef struct { char street[100]; char city[50]; int zip; } Address;\n\ntypedef struct {\n    char    name[50];\n    int     age;\n    Address addr;        // embedded struct\n    Address *work_addr;  // pointer to struct\n} Person;\n\nPerson p = {\n    .name = &quot;Alice&quot;,\n    .age  = 30,\n    .addr = {&quot;123 Main St&quot;, &quot;Springfield&quot;, 12345}\n};\n\nprintf(&quot;%s\\n&quot;, p.addr.city);\nprintf(&quot;%s\\n&quot;, p.work_addr-&gt;city);  // if allocated</code></pre>\n<h3>3.4 - Opaque pointers &amp; encapsulation</h3>\n<p>Hide implementation details, like C++ private members:</p>\n<pre class=\"code\"><code>// stack.h\ntypedef struct Stack Stack;   // incomplete type -- internals hidden\nStack* stack_create();\nvoid   stack_push(Stack *s, int val);\nint    stack_pop(Stack *s);\nvoid   stack_destroy(Stack *s);\n\n// stack.c -- full definition only here\nstruct Stack { int *data; int top; int capacity; };\n\nStack* stack_create() {\n    Stack *s = malloc(sizeof(Stack));\n    s-&gt;data = malloc(16 * sizeof(int));\n    s-&gt;top = 0; s-&gt;capacity = 16;\n    return s;\n}\n\nvoid stack_push(Stack *s, int val) {\n    if (s-&gt;top == s-&gt;capacity) {\n        s-&gt;capacity *= 2;\n        s-&gt;data = realloc(s-&gt;data, s-&gt;capacity * sizeof(int));\n    }\n    s-&gt;data[s-&gt;top++] = val;\n}</code></pre>\n<div class=\"callout\"><h4>Exercises - Level 4 (Advanced)</h4><ol><li>Doubly linked list with <code>data</code>, <code>prev</code>, <code>next</code> - append, prepend, delete, print_forward/backward.</li><li>Generic dynamic array using <code>void*</code>: <code>vec_init</code>, <code>vec_push</code>, <code>vec_get</code>, <code>vec_free</code>.</li><li>Binary search tree with insert, search, and inorder traversal.</li></ol></div>\n<h3>3.5 - Common pointer bugs</h3>\n<table><thead><tr><th>Bug</th><th>Description</th><th>Detection</th></tr></thead><tbody><tr><td>Null dereference</td><td><code>*p</code> when <code>p == NULL</code></td><td>Always check the malloc return</td></tr><tr><td>Dangling pointer</td><td>Accessing freed memory</td><td>Set <code>p = NULL</code> after free</td></tr><tr><td>Buffer overflow</td><td>Writing past array bounds</td><td>valgrind, AddressSanitizer</td></tr><tr><td>Memory leak</td><td><code>malloc</code> without <code>free</code></td><td>valgrind --leak-check=full</td></tr><tr><td>Double free</td><td><code>free(p)</code> twice</td><td>Set <code>p = NULL</code> after free</td></tr><tr><td>Stack overflow</td><td>Too-deep recursion</td><td>Watch recursion depth</td></tr></tbody></table>\n<p>Compile with maximum safety:</p>\n<pre class=\"code\"><code>gcc -Wall -Wextra -fsanitize=address,undefined -g program.c</code></pre>\n<h2>Part 4 \u00b7 Expert</h2>\n<h3>4.1 - Casting, aliasing &amp; type punning</h3>\n<pre class=\"code\"><code>// Inspect the bytes of any value\nfloat f = 3.14f;\nunsigned char *bytes = (unsigned char*)&amp;f;\nfor (int i = 0; i &lt; sizeof(f); i++)\n    printf(&quot;%02X &quot;, bytes[i]);\n\n// Safe type punning via a union (avoid strict-aliasing UB)\ntypedef union { float f; uint32_t u; } FloatBits;\nFloatBits fb = { .f = 3.14f };\nprintf(&quot;%08X\\n&quot;, fb.u);   // raw bits of the float</code></pre>\n<h3>4.2 - Multidimensional &amp; pointer arrays</h3>\n<pre class=\"code\"><code>// 2D array -- contiguous in memory\nint matrix[3][4];\nint (*row_ptr)[4] = matrix;   // pointer to an array of 4 ints\n\n// Array of pointers -- rows can have different lengths (jagged)\nint *rows[3];\nrows[0] = malloc(2 * sizeof(int));\nrows[1] = malloc(5 * sizeof(int));\nrows[2] = malloc(3 * sizeof(int));</code></pre>\n<h3>4.3 - Const correctness</h3>\n<pre class=\"code\"><code>int x = 5;\nconst int *p = &amp;x;        // can&#x27;t change *p, can change p\nint * const q = &amp;x;       // can change *q, can&#x27;t change q\nconst int * const r = &amp;x; // can change neither\n// Read right-to-left: &quot;r is a const pointer to const int&quot;</code></pre>" },
  { id: 'malloc-calloc',
    title: 'malloc vs calloc',
    blurb: 'Two ways to grab heap memory: what each does, how they differ in initialization, arguments and speed, with examples and the gotchas interviewers ask about.',
    html: "<p>Both <code>malloc</code> and <code>calloc</code> hand you a block of heap memory and return a pointer to it (or <code>NULL</code> on failure). The differences are small but come up in almost every C interview.</p>\n<h2>The one-line answer</h2>\n<p><strong><code>malloc</code> gives you uninitialized bytes; <code>calloc</code> gives you zeroed bytes</strong> - and <code>calloc</code> takes the count and element size as two arguments, guarding their multiplication against overflow.</p>\n<h2>Signatures</h2>\n<pre class=\"code\"><code>#include &lt;stdlib.h&gt;\n\nvoid *malloc(size_t size);              // one argument: total bytes\nvoid *calloc(size_t nmemb, size_t size); // two: count and element size\nvoid *realloc(void *ptr, size_t size);   // resize an existing block\nvoid  free(void *ptr);                   // release a block</code></pre>\n<h2>The differences</h2>\n<table><thead><tr><th></th><th>malloc</th><th>calloc</th></tr></thead><tbody><tr><td>Arguments</td><td>total size in bytes</td><td>count + per-element size</td></tr><tr><td>Initialization</td><td>uninitialized (garbage)</td><td>every byte set to 0</td></tr><tr><td>Overflow check</td><td>you compute the product yourself</td><td>checks <code>nmemb * size</code> for overflow</td></tr><tr><td>Typical speed</td><td>slightly faster (no zeroing)</td><td>extra cost to zero the memory*</td></tr><tr><td>Returns</td><td>pointer, or <code>NULL</code></td><td>pointer, or <code>NULL</code></td></tr></tbody></table>\n<p class=\"note\">*For large blocks <code>calloc</code> can be just as fast: the OS often hands out fresh pages already zeroed, so the zeroing is effectively free.</p>\n<h2>malloc - you must initialize</h2>\n<p>The memory you get back holds whatever was there before. Reading it before writing is undefined behavior.</p>\n<pre class=\"code\"><code>int *a = malloc(5 * sizeof(int));   // 5 ints, contents = garbage\nif (!a) { /* handle allocation failure */ }\n\nprintf(&quot;%d\\n&quot;, a[0]);   // UB -- reading uninitialized memory\n\nfor (int i = 0; i &lt; 5; i++) a[i] = 0;  // initialize before use\nfree(a);</code></pre>\n<h2>calloc - zeroed for you</h2>\n<pre class=\"code\"><code>int *b = calloc(5, sizeof(int));    // 5 ints, all guaranteed 0\nif (!b) { /* handle failure */ }\n\nprintf(&quot;%d\\n&quot;, b[0]);   // 0 -- safe\nfree(b);</code></pre>\n<h2>Side by side</h2>\n<pre class=\"code\"><code>// These two lines allocate the same amount of memory:\nint *x = malloc(n * sizeof(int));      // contents undefined\nint *y = calloc(n, sizeof(int));       // contents all zero\n\n// calloc is roughly equivalent to:\nint *z = malloc(n * sizeof(int));\nif (z) memset(z, 0, n * sizeof(int));  // ...plus the overflow check</code></pre>\n<h2>Which should I use?</h2>\n<ul><li><strong>Use <code>calloc</code></strong> when you need a zero/empty starting state - counters, flags, a fresh buffer, anything you would immediately <code>memset</code> to 0 anyway.</li><li><strong>Use <code>malloc</code></strong> when you are about to fill every byte yourself (e.g. copying data in), so zeroing first would be wasted work.</li><li>When in doubt, prefer <code>calloc</code> for safety - uninitialized reads are a classic source of heisenbugs.</li></ul>\n<h2>Gotchas interviewers probe</h2>\n<ul><li><strong>Don\u2019t cast the return in C.</strong> <code>int *p = malloc(...)</code> is correct; casting (<code>(int*)malloc</code>) is unnecessary and can hide a missing <code>#include &lt;stdlib.h&gt;</code>. (In C++ the cast is required - but you\u2019d usually use <code>new</code> there.)</li><li><strong>Always check for <code>NULL</code></strong> before using the pointer.</li><li><strong>Size from the variable, not the type:</strong> <code>p = malloc(n * sizeof(*p))</code> stays correct even if <code>p</code>\u2019s type changes.</li><li><strong><code>calloc</code> zeroes <em>bytes</em>.</strong> All-bits-zero is integer 0, and on every mainstream platform it is also a null pointer and <code>0.0</code> - but the C standard does not guarantee that for pointers or floating-point, so don\u2019t rely on it for portability-critical code.</li><li><strong>One <code>free</code> per allocation.</strong> Freeing twice or using after free is undefined behavior; set the pointer to <code>NULL</code> after freeing.</li></ul>\n<pre class=\"code\"><code>// Robust pattern\nint *p = malloc(n * sizeof(*p));\nif (p == NULL) { perror(&quot;malloc&quot;); exit(1); }\n// ... use p ...\nfree(p);\np = NULL;</code></pre>\n<h2>Bonus: resizing with realloc</h2>\n<p><code>realloc</code> grows or shrinks an existing block, copying the contents. Assign to a temporary so you don\u2019t leak the original if it fails.</p>\n<pre class=\"code\"><code>int *tmp = realloc(p, new_n * sizeof(*p));\nif (!tmp) { /* p is still valid -- handle error */ }\nelse { p = tmp; }\n// Note: any new space added by realloc is uninitialized (like malloc).</code></pre>\n<div class=\"callout\"><h4>Quick check</h4><p>You need a hash table\u2019s bucket array where empty buckets must read as <code>NULL</code>, and a scratch buffer you\u2019re about to fill with a file\u2019s contents. Which allocator for each?</p></div>\n<details><summary>Show answer</summary><p>Buckets \u2192 <code>calloc</code> (you want them zero/NULL initialized up front). Scratch buffer \u2192 <code>malloc</code> (you\u2019re overwriting every byte with file data, so zeroing first is wasted work).</p></details>" }
];

function buildConceptsList() {
  const wrap = document.createElement('div');
  wrap.id = 'concepts';
  const cards = CONCEPTS.map(function(c) {
    const key = 'concept::' + c.id;
    const dn = !!done[key];
    return '<div class="lesson-card' + (dn ? ' done' : '') + '" data-id="' + c.id + '" data-key="' + key + '">' +
      '<div class="lesson-card-head">' +
        '<div class="check-box" role="checkbox" aria-checked="' + dn + '" tabindex="0" title="Mark complete">' + (dn ? '\u2713' : '') + '</div>' +
        '<div class="lesson-card-title">' + c.title + '</div>' +
      '</div>' +
      '<div class="lesson-card-blurb">' + c.blurb + '</div>' +
      '<span class="lesson-card-go">Open refresher \u2192</span>' +
    '</div>';
  }).join('');
  wrap.innerHTML =
    '<button class="lesson-back" id="c-back">&larr; Back to Refreshers</button>' +
    '<div class="section-header">' +
      '<div class="section-icon" style="background:var(--tag-bg)"><i class="ti ti-book-2" style="color:var(--ember);font-size:17px" aria-hidden="true"></i></div>' +
      '<h2>C</h2>' +
      '<span class="section-badge">' + CONCEPTS.length + ' refresher' + (CONCEPTS.length > 1 ? 's' : '') + '</span>' +
    '</div>' +
    '<p class="concepts-intro">Long-form refreshers for the core C topics interviewers probe. Read end to end, or jump to the part you need - no timer, no grading, just the fundamentals.</p>' +
    '<div class="lesson-cards">' + cards + '</div>';
  wrap.querySelectorAll('.lesson-card').forEach(function(card) {
    const id = card.getAttribute('data-id');
    const key = card.getAttribute('data-key');
    const box = card.querySelector('.check-box');
    function toggle() { done[key] = !done[key]; if (!done[key]) delete done[key]; saveState(); render(); }
    box.onclick = function(e) { e.stopPropagation(); toggle(); };
    box.onkeydown = function(e) { if (e.key === 'Enter' || e.key === ' ') { e.preventDefault(); e.stopPropagation(); toggle(); } };
    card.onclick = function(e) { if (e.target.closest('.check-box')) return; openLesson(id); };
  });
  const cb = wrap.querySelector('#c-back'); if (cb) cb.onclick = function() { activeView = 'refreshers'; render(); };
  return wrap;
}

    '<div class="section-header">' +

      '<h2>Refreshers</h2>' +
      '<span class="section-badge">3 tracks</span>' +
    '</div>' +
    '<p class="concepts-intro">Theory refreshers grouped by language and domain — no timer, no grading, just the fundamentals and worked examples.</p>' +
    '<div class="lesson-cards">' +
      '<button class="lesson-card" data-go="concepts"><div class="lesson-card-title">C</div><div class="lesson-card-blurb">Pointers, structs and dynamic memory — the language fundamentals.</div><span class="lesson-card-go">' + CONCEPTS.length + ' lessons &rarr;</span></button>' +
      '<button class="lesson-card" data-go="C++"><div class="lesson-card-title">C++</div><div class="lesson-card-blurb">OOP, virtual/vtable, templates, casting and smart pointers.</div><span class="lesson-card-go">' + cppN + ' topics &rarr;</span></button>' +

function openLesson(id) {
  const c = CONCEPTS.find(function(x) { return x.id === id; });
  if (!c) return;
  const el = document.getElementById('lesson');
  el.innerHTML =
    '<button class="lesson-back" id="lesson-back">\u2190 Back to C</button>' +
    '<div class="pr-cat">C</div>' +
    '<h1 class="lesson-title">' + c.title + '</h1>' +
    '<article class="lesson-body">' + c.html + '</article>';
  document.getElementById('app').classList.add('reading');
  window.scrollTo(0, 0);
  document.getElementById('lesson-back').onclick = closeLesson;
}

function closeLesson() {
  document.getElementById('app').classList.remove('reading');
  render();
  window.scrollTo(0, 0);
}

function openTheory(catName, item, key) {
  const el = document.getElementById('lesson');
  const isDone = !!done[key];
  el.innerHTML =
    '<button class="lesson-back" id="lesson-back">\u2190 Back to ' + catName + '</button>' +
    '<div class="pr-cat">' + catName + '</div>' +
    '<h1 class="lesson-title">' + item.text + '</h1>' +
    '<article class="lesson-body">' + item.explanation + '</article>' +
    '<div class="pr-actions" style="margin-top:1.8rem">' +
      '<button class="pr-btn ' + (isDone ? 'is-done' : 'primary') + '" id="theory-done">' + (isDone ? '\u2713 Marked complete' : 'Mark complete') + '</button>' +
    '</div>';
  document.getElementById('app').classList.add('reading');
  window.scrollTo(0, 0);
  document.getElementById('lesson-back').onclick = closeLesson;
  const db = document.getElementById('theory-done');
  db.onclick = function() {
    done[key] = !done[key];
    if (!done[key]) delete done[key];
    saveState(); updateDoneStat();
    if (done[key]) { db.className = 'pr-btn is-done'; db.textContent = '\u2713 Marked complete'; }
    else { db.className = 'pr-btn primary'; db.textContent = 'Mark complete'; }
  };
}

function saveState() {
  try { localStorage.setItem(STORAGE_KEY, JSON.stringify(done)); } catch(e) {}
}

function itemKey(cat, idx) { return cat + '::' + idx; }

function totalItems() {
  return Object.values(DATA).reduce((s, c) => s + c.items.length, 0);
}
function totalDone() {
  return Object.keys(done).filter(k => done[k]).length;
}
function practiceCount() {
  let n = 0;
  Object.entries(DATA).forEach(function([k, c]) { if (['C++','Embedded Specific'].indexOf(k) === -1) n += c.items.length; });
  return n;
}
function theoryCount() {
  let n = 0;
  ['C++','Embedded Specific'].forEach(function(k) { if (DATA[k]) n += DATA[k].items.length; });
  return n;
}
function trackableTotal() { return practiceCount() + theoryCount() + CONCEPTS.length; }

function buildStats() {
  const row = document.getElementById('stats-row');
  row.innerHTML =
    '<div class="stat"><div class="stat-num">' + practiceCount() + '</div><div class="stat-label">practice</div></div>' +
    '<div class="stat"><div class="stat-num">' + theoryCount() + '</div><div class="stat-label">theory</div></div>' +
    '<div class="stat" id="stat-done"><div class="stat-num" id="done-num">' + totalDone() + '</div><div class="stat-label">completed</div></div>';
}

function updateDoneStat() {
  const el = document.getElementById('done-num');
  if (el) el.textContent = totalDone();
  const fp = document.getElementById('footer-progress');
  if (fp) fp.textContent = totalDone() + ' of ' + trackableTotal() + ' completed';
  const total = trackableTotal(), d = totalDone();
  const hp = document.getElementById('hero-progress');
  if (hp) hp.style.width = (total ? (d / total * 100) : 0) + '%';
  const hl = document.getElementById('hero-progress-label');
  if (hl) hl.textContent = d + ' / ' + total + ' forged';
}

    if (REF.indexOf(name) !== -1) return;
    const btn = document.createElement('button');
    btn.className = 'cat-btn cat-child' + (activeView === 'topics' && activeCategory === name ? ' active' : '');
    btn.innerHTML = name + ' <span class="cat-count">' + cat.items.length + '</span>';
    btn.onclick = function() { activeView = 'topics'; activeCategory = name; render(); };

  refBtn.onclick = function() { activeView = 'refreshers'; render(); };
  sb.appendChild(refBtn);

  const cBtn = document.createElement('button');
  cBtn.className = 'cat-btn cat-child' + (activeView === 'concepts' ? ' active' : '');
  cBtn.innerHTML = 'C <span class="cat-count">' + CONCEPTS.length + '</span>';
  cBtn.onclick = function() { activeView = 'concepts'; render(); };
  sb.appendChild(cBtn);

  REF.forEach(function(name) {
    if (!DATA[name]) return;
    const btn = document.createElement('button');
    btn.className = 'cat-btn cat-child' + (activeView === 'topics' && activeCategory === name ? ' active' : '');
    btn.innerHTML = name + ' <span class="cat-count">' + DATA[name].items.length + '</span>';
    btn.onclick = function() { activeView = 'topics'; activeCategory = name; render(); };
    sb.appendChild(btn);
  });
}

function matchesFilter(cat, item, idx) {
  const key = itemKey(cat, idx);
  const isDone = !!done[key];
  if (activeFilter === 'todo' && isDone) return false;
  if (activeFilter === 'done' && !isDone) return false;
  if (searchQuery) {
    if (!item.text.toLowerCase().includes(searchQuery.toLowerCase())) return false;
  }
  return true;
}

function buildSection(name, cat, offset) {
  const visibleItems = cat.items
    .map(function(item, i) { return { item: item, idx: i + offset }; })
    .filter(function(o) { return matchesFilter(name, o.item, o.idx); });

  if (!visibleItems.length) return null;

  const doneInCat = cat.items.filter(function(_, i) { return done[itemKey(name, i + offset)]; }).length;
  const pct = Math.round(doneInCat / cat.items.length * 100);

  const sec = document.createElement('div');
  sec.className = 'section visible';
  sec.id = 'sec-' + name.replace(/\s+/g, '-');

  sec.innerHTML =
    '<div class="section-header">' +
      '<div class="section-icon" style="background:' + cat.iconBg + '">' +
        '<i class="ti ' + cat.icon + '" style="color:' + cat.color + ';font-size:17px" aria-hidden="true"></i>' +
      '</div>' +
      '<h2>' + name + '</h2>' +
      '<span class="section-badge">' + cat.items.length + ' topics</span>' +
    '</div>' +
    '<div class="progress-bar-wrap">' +
      '<div class="progress-bar"><div class="progress-fill" style="width:' + pct + '%"></div></div>' +
      '<span class="progress-label">' + doneInCat + ' / ' + cat.items.length + '</span>' +
    '</div>' +
    '<div class="topics-grid"></div>';

  const grid = sec.querySelector('.topics-grid');
  visibleItems.forEach(function(o) {
    const item = o.item;
    const idx = o.idx;
    const key = itemKey(name, idx);
    const isDone = !!done[key];
    const card = document.createElement('div');
    card.className = 'topic-card' + (isDone ? ' done' : '');
    card.innerHTML =
      '<div class="check-box" role="checkbox" aria-checked="' + isDone + '" tabindex="0" title="Mark complete">' + (isDone ? '✓' : '') + '</div>' +
      '<span class="topic-text">' + item.text + '</span>';

    function toggle() {
      done[key] = !done[key];
      if (!done[key]) delete done[key];
      saveState();
      render();
    }

    const cb = card.querySelector('.check-box');
    cb.onclick = toggle;
    cb.onkeydown = function(e) { if (e.key === 'Enter' || e.key === ' ') { e.preventDefault(); toggle(); } };

    const txt = card.querySelector('.topic-text');
    txt.setAttribute('role', 'button');
    txt.setAttribute('tabindex', '0');
    txt.title = 'Open practice';
    txt.onclick = function() { openPractice(name, item, key); };
    txt.onkeydown = function(e) { if (e.key === 'Enter' || e.key === ' ') { e.preventDefault(); openPractice(name, item, key); } };

    grid.appendChild(card);
  });

  return sec;
}

function render() {
  buildSidebar();
  const content = document.getElementById('content');
  const noResults = document.getElementById('no-results');

  content.querySelectorAll('.section').forEach(function(s) { s.remove(); });
  const oldConcepts = document.getElementById('concepts');
  if (oldConcepts) oldConcepts.remove();

  if (activeView === 'refreshers') {
    noResults.style.display = 'none';
    content.appendChild(buildRefreshersLanding());
    updateDoneStat();
    return;
  }

  if (activeView === 'concepts') {
    noResults.style.display = 'none';
    content.appendChild(buildConceptsList());
    updateDoneStat();
    return;
  }

  let offset = 0;
  let anyVisible = false;

  Object.entries(DATA).forEach(function([name, cat]) {
    const show = (activeCategory === name) || (activeCategory === 'all' && ['C++','Embedded Specific'].indexOf(name) === -1);
    if (!show) { offset += cat.items.length; return; }
    const sec = buildSection(name, cat, offset);
    if (sec) { content.appendChild(sec); anyVisible = true; }
    offset += cat.items.length;
  });

  noResults.style.display = anyVisible ? 'none' : 'block';
  updateDoneStat();
}

document.getElementById('search-input').addEventListener('input', function(e) {
  searchQuery = e.target.value.trim();
  if (searchQuery) { activeCategory = 'all'; activeView = 'topics'; }
  render();
});

document.querySelectorAll('.pill').forEach(function(p) {
  p.addEventListener('click', function() {
    document.querySelectorAll('.pill').forEach(function(x) { x.classList.remove('active'); });
    p.classList.add('active');
    activeFilter = p.dataset.filter;
    render();
  });
});

/* ===== Practice view (added) ===== */
const HINT_UNLOCKS = [600, 1200, 1800]; /* seconds = 10, 20, 30 min. Lower (e.g. 5,10,15) while testing. */
const PR_TOTAL = HINT_UNLOCKS[2];
const WB_KEY = 'eswe_wb_v1';
let prTimer = null, prElapsed = 0;

/* ----- Code IDE config (added) ----- */
const CODING_CATEGORIES = new Set([
  'Linked List', 'Arrays', 'Hashmap', 'Stack', 'Queue', 'Sorting', 'Searching', 'Bit Manipulation'
]);
const CODE_KEY = 'eswe_code_v1';
const TEMPLATES = {
  c:    '#include <stdio.h>\n\nint main(void) {\n    \n    return 0;\n}\n',
  cpp:  '#include <bits/stdc++.h>\nusing namespace std;\n\nint main() {\n    \n    return 0;\n}\n',
  rust: 'fn main() {\n    \n}\n'
};
const LANG_MAP = {
  c:    { lang: 'c',    file: 'main.c'   },
  cpp:  { lang: 'c++',  file: 'main.cpp' },
  rust: { lang: 'rust', file: 'main.rs'  }
};
let pistonVersions = null;

function getCode(k) { try { return (JSON.parse(localStorage.getItem(CODE_KEY) || '{}'))[k]; } catch(e) { return undefined; } }
function setCode(k, v) {
  let a = {};
  try { a = JSON.parse(localStorage.getItem(CODE_KEY) || '{}'); } catch(e) {}
  a[k] = v;
  try { localStorage.setItem(CODE_KEY, JSON.stringify(a)); } catch(e) {}
}

async function ensureVersions() {
  if (pistonVersions) return pistonVersions;
  const res = await fetch('https://emkc.org/api/v2/piston/runtimes');
  const list = await res.json();
  pistonVersions = {};
  list.forEach(function(r) {
    [r.language].concat(r.aliases || []).forEach(function(a) {
      if (!pistonVersions[a]) pistonVersions[a] = r.version;
    });
  });
  return pistonVersions;
}

async function runCode(langKey, code, stdin) {
  const v = await ensureVersions();
  const m = LANG_MAP[langKey];
  const version = v[m.lang] || v[langKey] || '*';
  const res = await fetch('https://emkc.org/api/v2/piston/execute', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ language: m.lang, version: version, files: [{ name: m.file, content: code }], stdin: stdin || '' })
  });
  if (!res.ok) throw new Error('runner ' + res.status);
  return res.json();
}

function getNote(key) {
  try { return (JSON.parse(localStorage.getItem(WB_KEY) || '{}'))[key] || ''; } catch(e) { return ''; }
}
function setNote(key, txt) {
  let all = {};
  try { all = JSON.parse(localStorage.getItem(WB_KEY) || '{}'); } catch(e) {}
  all[key] = txt;
  try { localStorage.setItem(WB_KEY, JSON.stringify(all)); } catch(e) {}
}
function fmtTime(s) { return String(Math.floor(s/60)).padStart(2,'0') + ':' + String(s%60).padStart(2,'0'); }
function escapeHtml(s) { return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }
function inlineCode(s) { return escapeHtml(s).replace(/`([^`]+)`/g, '<code>$1</code>'); }

function openPractice(catName, item, key) {
  if (item.explanation) { openTheory(catName, item, key); return; }
  const pr = document.getElementById('practice');
  const hasHints = Array.isArray(item.hints) && item.hints.length === 3;
  const isDone = !!done[key];
  const isCoding = CODING_CATEGORIES.has(catName);

  const ideHtml = isCoding ? (
    '<div class="ide" id="pr-ide">' +
      '<div class="pr-wb-label" style="margin-top:0.2rem">Code editor</div>' +
      '<div class="ide-bar">' +
        '<select class="ide-lang" id="ide-lang" aria-label="Language">' +
          '<option value="c">C</option><option value="cpp">C++</option><option value="rust">Rust</option>' +
        '</select>' +
        '<button class="ide-run" id="ide-run" type="button">Run</button>' +
        '<button class="ide-reset" id="ide-reset" type="button">Reset to template</button>' +
      '</div>' +
      '<div class="editor-wrap">' +
        '<div class="editor-gutter" id="ide-gutter">1</div>' +
        '<textarea class="editor-area" id="ide-code" spellcheck="false" wrap="off" autocapitalize="off" autocorrect="off" aria-label="Code editor"></textarea>' +
      '</div>' +
      '<textarea class="ide-stdin" id="ide-stdin" rows="1" placeholder="Standard input (optional)"></textarea>' +
      '<div class="ide-out-label"><span>Output</span><span class="st" id="ide-status"></span></div>' +
      '<div class="ide-out-body" id="ide-out">Write your solution above and press Run. C, C++ and Rust only.</div>' +
      '<div class="ide-note">Code compiles and runs via the free public Piston API over the internet (no sign-in, rate-limited). Your code is saved per topic in this browser.</div>' +
    '</div>'
  ) : '';

  let hintsHtml;
  if (hasHints) {
    hintsHtml = '<div class="pr-hints" id="pr-hints">' + item.hints.map(function(h, i) {
      return '<div class="pr-hint locked" id="pr-hint' + i + '">' +
        '<div class="pr-hint-head"><span class="coal"></span>Hint ' + (i+1) + '</div>' +
        '<div id="pr-hb' + i + '"><div class="pr-hint-when">Unlocks at ' + fmtTime(HINT_UNLOCKS[i]) + '</div></div>' +
      '</div>';
    }).join('') + '</div>';
  } else {
    hintsHtml = '<p class="pr-note" style="margin-top:0;border:none;padding:0 0 1.2rem">Hints aren\'t written for this topic yet. Practice on the whiteboard, then add prompt / hints / solution to this item in DATA.</p>';
  }

  const solBody = item.solution
    ? '<pre>' + escapeHtml(item.solution) + '</pre>'
    : '<pre>No solution written yet. Add a "solution" field to this item in DATA.</pre>';

  pr.innerHTML =
    '<button class="pr-back" id="pr-back">&larr; Back to topics</button>' +
    '<div class="pr-cat">' + escapeHtml(catName) + '</div>' +
    '<h1 class="pr-title">' + escapeHtml(item.text) + '</h1>' +
    '<div class="pr-prompt">' + inlineCode(item.prompt || 'Solve this on the whiteboard as you would in a real interview. Reason out loud: approach, edge cases, complexity.') + '</div>' +
    '<div class="forge">' +
      '<div class="forge-top"><span class="forge-label">Forge heat</span><span class="forge-timer" id="pr-timer">00:00</span></div>' +
      '<div class="heat-track"><div class="heat-fill" id="pr-fill"></div></div>' +
      '<div class="heat-notches"><span class="nx" id="pr-n0" style="left:33.3%">10:00</span><span class="nx" id="pr-n1" style="left:66.6%">20:00</span><span class="nx" id="pr-n2" style="left:100%">30:00</span></div>' +
    '</div>' +
    hintsHtml +
    '<div class="pr-wb-label">Your whiteboard</div>' +
    '<textarea class="pr-wb" id="pr-wb" placeholder="No autocomplete, no syntax help — just like the real thing."></textarea>' +
    ideHtml +
    '<div class="pr-actions">' +
      '<button class="pr-btn ' + (isDone ? 'is-done' : 'primary') + '" id="pr-done">' + (isDone ? '\u2713 Marked complete' : 'Mark complete') + '</button>' +
      '<button class="pr-btn" id="pr-reveal">Reveal full solution</button>' +
    '</div>' +
    '<div class="pr-solution" id="pr-solution"><div class="pr-solution-inner"><h3>Solution &amp; what they\'re testing</h3>' + solBody + '</div></div>' +
    '<p class="pr-note">Hints unlock at 10, 20 and 30 minutes — change HINT_UNLOCKS in the script to adjust. AI grading of the whiteboard needs a backend, so it isn\'t wired in here yet.</p>';

  document.getElementById('app').classList.add('practicing');
  window.scrollTo(0, 0);

  const wb = document.getElementById('pr-wb');
  wb.value = getNote(key);
  wb.oninput = function() { setNote(key, wb.value); };

  document.getElementById('pr-back').onclick = closePractice;
  document.getElementById('pr-reveal').onclick = function() {
    document.getElementById('pr-solution').classList.add('show');
  };
  const db = document.getElementById('pr-done');
  db.onclick = function() {
    done[key] = !done[key];
    if (!done[key]) delete done[key];
    saveState(); updateDoneStat();
    if (done[key]) { db.className = 'pr-btn is-done'; db.textContent = '\u2713 Marked complete'; }
    else { db.className = 'pr-btn primary'; db.textContent = 'Mark complete'; }
  };

  startPrTimer(item, hasHints);

  if (isCoding) {
    const codeEl = document.getElementById('ide-code');
    const gutter = document.getElementById('ide-gutter');
    const langSel = document.getElementById('ide-lang');
    const stdinEl = document.getElementById('ide-stdin');
    const runBtn = document.getElementById('ide-run');
    const resetBtn = document.getElementById('ide-reset');
    const outEl = document.getElementById('ide-out');
    const statusEl = document.getElementById('ide-status');

    const codeKeyFor = function(lang) { return key + '::code::' + lang; };

    const refreshGutter = function() {
      const n = codeEl.value.split('\n').length || 1;
      let s = '';
      for (let i = 1; i <= n; i++) s += i + (i < n ? '\n' : '');
      gutter.textContent = s;
    };
    const loadLang = function(lang) {
      const saved = getCode(codeKeyFor(lang));
      codeEl.value = (saved !== undefined && saved !== null) ? saved : TEMPLATES[lang];
      refreshGutter();
      codeEl.scrollTop = 0; gutter.scrollTop = 0;
    };

    codeEl.addEventListener('input', function() { setCode(codeKeyFor(langSel.value), codeEl.value); refreshGutter(); });
    codeEl.addEventListener('scroll', function() { gutter.scrollTop = codeEl.scrollTop; });
    codeEl.addEventListener('keydown', function(e) {
      if (e.key === 'Tab') {
        e.preventDefault();
        const s = codeEl.selectionStart, en = codeEl.selectionEnd;
        codeEl.value = codeEl.value.slice(0, s) + '    ' + codeEl.value.slice(en);
        codeEl.selectionStart = codeEl.selectionEnd = s + 4;
        setCode(codeKeyFor(langSel.value), codeEl.value); refreshGutter();
      }
    });
    langSel.onchange = function() { loadLang(langSel.value); };
    resetBtn.onclick = function() {
      codeEl.value = TEMPLATES[langSel.value];
      setCode(codeKeyFor(langSel.value), codeEl.value);
      refreshGutter();
    };
    runBtn.onclick = async function() {
      runBtn.disabled = true;
      statusEl.textContent = 'running…';
      outEl.classList.remove('err');
      outEl.textContent = 'Compiling and running…';
      try {
        const data = await runCode(langSel.value, codeEl.value, stdinEl.value);
        const compile = data.compile || {};
        const run = data.run || {};
        let text = '', isErr = false;
        if (compile.code && compile.code !== 0) {
          text = (compile.stderr || compile.output || 'Compilation failed.').trim();
          isErr = true;
        } else {
          text = ((run.stdout || '') + (run.stderr || '')).replace(/\s+$/, '');
          if ((run.code && run.code !== 0) || run.signal) isErr = true;
        }
        outEl.textContent = text || '(no output)';
        outEl.classList.toggle('err', isErr);
        statusEl.textContent = isErr ? 'exit ' + (run.code != null ? run.code : '1') : 'done';
      } catch (err) {
        outEl.classList.add('err');
        outEl.textContent = "Couldn't reach the code runner. It's a free public service (Piston) and may be rate-limited or blocked on your network — try again in a moment, or self-host Piston / use Judge0 for production.";
        statusEl.textContent = 'error';
      } finally {
        runBtn.disabled = false;
      }
    };

    loadLang('c');
  }
}

function startPrTimer(item, hasHints) {
  stopPrTimer();
  prElapsed = 0;
  prTick(item, hasHints);
  prTimer = setInterval(function() { prElapsed++; prTick(item, hasHints); }, 1000);
}
function stopPrTimer() { if (prTimer) clearInterval(prTimer); prTimer = null; }

function prTick(item, hasHints) {
  const t = document.getElementById('pr-timer');
  if (!t) { stopPrTimer(); return; }
  t.textContent = fmtTime(prElapsed);
  const fill = document.getElementById('pr-fill');
  if (fill) fill.style.right = (100 - Math.min(prElapsed / PR_TOTAL, 1) * 100) + '%';
  if (!hasHints) return;
  HINT_UNLOCKS.forEach(function(threshold, i) {
    const card = document.getElementById('pr-hint' + i);
    if (prElapsed >= threshold && card && card.classList.contains('locked')) {
      card.classList.remove('locked'); card.classList.add('unlocked');
      const n = document.getElementById('pr-n' + i); if (n) n.classList.add('lit');
      const body = document.getElementById('pr-hb' + i);
      body.innerHTML = '<button class="pr-hint-reveal" type="button">Reveal hint</button>';
      body.querySelector('button').onclick = function() {
        body.innerHTML = '<div class="pr-hint-text">' + inlineCode(item.hints[i]) + '</div>';
      };
    }
  });
}

function closePractice() {
  stopPrTimer();
  document.getElementById('app').classList.remove('practicing');
  render();
  window.scrollTo(0, 0);
}

(function() {
  const btn = document.getElementById('theme-toggle');
  if (btn) {
    function isLight() { return document.documentElement.getAttribute('data-theme') === 'light'; }
    function setIcon() { btn.innerHTML = isLight() ? '<i class="ti ti-moon" aria-hidden="true"></i>' : '<i class="ti ti-sun" aria-hidden="true"></i>'; }
    setIcon();
    btn.onclick = function() {
      const next = isLight() ? 'dark' : 'light';
      document.documentElement.setAttribute('data-theme', next);
      try { localStorage.setItem('eswe_theme', next); } catch (e) {}
      setIcon();
    };
  }
})();

buildStats();
render();
updateDoneStat();
</script>
