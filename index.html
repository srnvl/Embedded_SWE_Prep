<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title> CoreForge </title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:opsz,wght@12..96,500;12..96,700;12..96,800&family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet" />
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/tabler-icons.min.css" />
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #F6F8FB;
    --bg2: #FFFFFF;
    --bg3: #0F1B2D;
    --surface: #FFFFFF;
    --surface2: #EAEFF5;
    --line: rgba(20,35,59,0.09);
    --line2: rgba(20,35,59,0.15);
    --text: #14233B;
    --muted: #586784;
    --faint: #93A1B5;
    --ember: #2563EB;
    --ember2: #4F86F7;
    --ember-glow: rgba(37,99,235,0.16);
    --copper: #7AA7FF;
    --steel: #8093A9;
    --steel-dim: #CBD5E1;
    --done: #0E9F6E;
    --done2: #6FD3A8;
    --tag-bg: rgba(37,99,235,0.09);

    --font-display: 'Bricolage Grotesque', sans-serif;
    --font-body: 'Inter', system-ui, sans-serif;
    --font-mono: 'JetBrains Mono', ui-monospace, monospace;

    --r: 10px;
    --r-lg: 14px;
  }

  html { scroll-behavior: smooth; }
  body {
    background: var(--bg);
    color: var(--text);
    font-family: var(--font-body);
    font-size: 15px;
    line-height: 1.65;
    min-height: 100vh;
    -webkit-font-smoothing: antialiased;
  }
  ::selection { background: var(--tag-bg); }
  ::-webkit-scrollbar { width: 10px; height: 10px; }
  ::-webkit-scrollbar-thumb { background: var(--steel-dim); border-radius: 6px; }
  ::-webkit-scrollbar-thumb:hover { background: var(--steel); }
  :focus-visible { outline: 2px solid var(--ember); outline-offset: 3px; border-radius: 4px; }

  @keyframes rise { from { opacity: 0; transform: translateY(14px); } to { opacity: 1; transform: none; } }
  @media (prefers-reduced-motion: no-preference) {
    .hero, #practice { animation: rise 0.45s cubic-bezier(.2,.7,.2,1) both; }
  }

  /* ===== HERO ===== */
  .hero {
    padding: 3.75rem 2.75rem 2.5rem;
    border-bottom: 1px solid var(--line);
    position: relative;
  }
  .hero-eyebrow {
    font-family: var(--font-mono);
    font-size: 11px;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: var(--ember);
    display: inline-flex; align-items: center; gap: 9px;
    margin-bottom: 1.1rem;
  }
  .hero-eyebrow .spark { width: 7px; height: 7px; border-radius: 2px; background: var(--ember); flex: none; }
  .hero h1 {
    font-family: var(--font-display);
    font-size: clamp(2.3rem, 5.5vw, 3.9rem);
    font-weight: 800;
    line-height: 1.0;
    letter-spacing: -0.03em;
    margin-bottom: 0.9rem;
  }
  .hero h1 span { color: var(--ember); }
  .hero p { font-size: 15px; color: var(--muted); max-width: 560px; margin-bottom: 2rem; }
  .stats-row { display: flex; gap: 0.7rem; flex-wrap: wrap; margin-bottom: 1.6rem; }
  .stat { background: var(--surface); border: 1px solid var(--line); border-radius: var(--r); padding: 0.65rem 1.15rem; min-width: 84px; }
  .stat-num { font-family: var(--font-display); font-size: 1.5rem; font-weight: 700; color: var(--text); line-height: 1.1; }
  #stat-done .stat-num, .stat:last-child .stat-num { color: var(--done); }
  .stat-label { font-size: 10px; color: var(--muted); font-family: var(--font-mono); letter-spacing: 0.08em; text-transform: uppercase; margin-top: 2px; }

  .forge-progress { display: flex; align-items: center; gap: 14px; max-width: 560px; }
  .fp-track { flex: 1; height: 6px; background: var(--surface2); border-radius: 6px; overflow: hidden; }
  .fp-fill { height: 100%; width: 0; border-radius: 6px; background: linear-gradient(90deg, var(--done2), var(--done)); transition: width 0.5s cubic-bezier(.2,.7,.2,1); }
  .fp-label { font-family: var(--font-mono); font-size: 11px; color: var(--muted); white-space: nowrap; }

  /* ===== SEARCH BAR ===== */
  .search-bar {
    padding: 1rem 2.75rem;
    border-bottom: 1px solid var(--line);
    display: flex; gap: 0.8rem; align-items: center; flex-wrap: wrap;
    position: sticky; top: 0; z-index: 10;
    background: rgba(246,248,251,0.9);
    backdrop-filter: blur(12px);
  }
  .search-wrap {
    flex: 1; min-width: 200px;
    display: flex; align-items: center; gap: 10px;
    background: var(--surface); border: 1px solid var(--line2); border-radius: var(--r);
    padding: 0 1rem; transition: border-color 0.15s, box-shadow 0.15s;
  }
  .search-wrap:focus-within { border-color: var(--ember); box-shadow: 0 0 0 3px var(--ember-glow); }
  .search-wrap i { color: var(--faint); font-size: 17px; }
  .search-wrap input { background: transparent; border: none; outline: none; color: var(--text); font-family: var(--font-mono); font-size: 13px; padding: 0.6rem 0; width: 100%; }
  .search-wrap input::placeholder { color: var(--faint); }
  .filter-pills { display: flex; gap: 6px; flex-wrap: wrap; }
  .pill { font-family: var(--font-mono); font-size: 11px; padding: 7px 15px; border-radius: 999px; border: 1px solid var(--line2); background: var(--surface); color: var(--muted); cursor: pointer; transition: all 0.15s; white-space: nowrap; }
  .pill:hover { border-color: var(--ember); color: var(--ember); }
  .pill.active { background: var(--ember); border-color: var(--ember); color: #fff; font-weight: 500; }

  /* ===== LAYOUT ===== */
  .main { display: grid; grid-template-columns: 256px 1fr; align-items: start; }

  /* ===== SIDEBAR ===== */
  .sidebar { border-right: 1px solid var(--line); padding: 1.5rem 0.9rem; position: sticky; top: 60px; height: calc(100vh - 60px); overflow-y: auto; }
  .sidebar-title { font-family: var(--font-mono); font-size: 10px; letter-spacing: 0.18em; text-transform: uppercase; color: var(--faint); padding: 0 0.9rem; margin-bottom: 0.9rem; }
  .cat-btn {
    display: flex; align-items: center; justify-content: space-between; gap: 10px;
    width: 100%; padding: 0.6rem 0.9rem;
    background: transparent; border: 1px solid transparent; border-radius: var(--r);
    color: var(--muted); font-family: var(--font-body); font-size: 13.5px; font-weight: 500;
    cursor: pointer; text-align: left; transition: all 0.13s;
  }
  .cat-btn:hover { color: var(--text); background: var(--surface2); }
  .cat-btn.active { color: var(--text); background: var(--surface); border-color: var(--line2); }
  .cat-btn.active::before { content: ''; width: 6px; height: 6px; border-radius: 50%; background: var(--ember); flex: none; margin-right: -2px; }
  .cat-count { font-family: var(--font-mono); font-size: 10px; background: var(--surface2); border-radius: 8px; padding: 2px 8px; color: var(--muted); flex-shrink: 0; }
  .cat-btn.active .cat-count { background: var(--tag-bg); color: var(--ember); }

  /* ===== CONTENT ===== */
  .content { padding: 2rem 2.75rem 4rem; }
  .section { margin-bottom: 3rem; display: none; }
  .section.visible { display: block; }
  .section-header { display: flex; align-items: center; gap: 0.85rem; margin-bottom: 0.6rem; padding-bottom: 0.9rem; border-bottom: 1px solid var(--line); }
  .section-icon { width: 36px; height: 36px; border-radius: var(--r); display: flex; align-items: center; justify-content: center; font-size: 17px; flex-shrink: 0; border: 1px solid var(--line); }
  .section-header h2 { font-family: var(--font-display); font-size: 1.4rem; font-weight: 700; letter-spacing: -0.02em; }
  .section-badge { font-family: var(--font-mono); font-size: 10px; padding: 3px 9px; border-radius: 8px; background: var(--surface2); color: var(--muted); margin-left: auto; }
  .progress-bar-wrap { display: flex; align-items: center; gap: 12px; margin-bottom: 1.2rem; }
  .progress-bar { flex: 1; height: 3px; background: var(--surface2); border-radius: 2px; overflow: hidden; }
  .progress-fill { height: 100%; background: linear-gradient(90deg, var(--done2), var(--done)); border-radius: 2px; transition: width 0.3s ease; }
  .progress-label { font-family: var(--font-mono); font-size: 10px; color: var(--muted); white-space: nowrap; }

  /* ===== TOPIC CARDS ===== */
  .topics-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 10px; }
  .topic-card { background: var(--surface); border: 1px solid var(--line); border-radius: var(--r); padding: 0.85rem 1.1rem; display: flex; align-items: flex-start; gap: 12px; position: relative; overflow: hidden; transition: border-color 0.15s, transform 0.12s, box-shadow 0.15s; }
  .topic-card::before { content: ''; position: absolute; left: 0; top: 0; bottom: 0; width: 2px; background: var(--ember); transform: scaleY(0); transform-origin: top; transition: transform 0.18s; }
  .topic-card:hover { border-color: var(--line2); transform: translateY(-2px); box-shadow: 0 6px 20px rgba(20,35,59,0.06); }
  .topic-card:hover::before { transform: scaleY(1); }
  .topic-card.done { opacity: 0.62; }
  .topic-card.done::before { transform: scaleY(1); background: var(--done); }
  .topic-card.done .topic-text { color: var(--muted); text-decoration: line-through; text-decoration-color: var(--steel-dim); }
  .check-box { width: 17px; height: 17px; border: 1.5px solid var(--line2); border-radius: 5px; flex-shrink: 0; margin-top: 2px; cursor: pointer; display: flex; align-items: center; justify-content: center; font-size: 10px; color: transparent; user-select: none; transition: all 0.13s; }
  .topic-card:hover .check-box { border-color: var(--ember); }
  .topic-card.done .check-box { background: var(--done); border-color: var(--done); color: #fff; font-weight: 700; }
  .topic-text { font-size: 13.5px; line-height: 1.55; color: var(--text); flex: 1; cursor: pointer; transition: color 0.13s; }
  .topic-text:hover { color: var(--ember); }
  .no-results { padding: 4rem; text-align: center; color: var(--muted); font-family: var(--font-mono); font-size: 13px; display: none; }

  /* ===== FOOTER ===== */
  footer { border-top: 1px solid var(--line); padding: 1.4rem 2.75rem; display: flex; align-items: center; justify-content: space-between; flex-wrap: wrap; gap: 0.5rem; }
  footer span, footer a { font-family: var(--font-mono); font-size: 11px; color: var(--muted); }
  footer a { color: var(--ember); text-decoration: none; }
  footer a:hover { text-decoration: underline; }

  /* ===== PRACTICE VIEW ===== */
  #practice { display: none; padding: 2.5rem 2.75rem 4rem; max-width: 940px; }
  #app.practicing .search-bar, #app.practicing .main { display: none; }
  #app.practicing #practice { display: block; }
  .pr-back { font-family: var(--font-mono); font-size: 12px; color: var(--muted); background: none; border: none; cursor: pointer; display: inline-flex; gap: 8px; align-items: center; margin-bottom: 1.6rem; transition: color 0.13s; }
  .pr-back:hover { color: var(--ember); }
  .pr-cat { font-family: var(--font-mono); font-size: 11px; letter-spacing: 0.18em; text-transform: uppercase; color: var(--ember); margin-bottom: 0.6rem; }
  .pr-title { font-family: var(--font-display); font-size: clamp(1.7rem, 4vw, 2.5rem); font-weight: 800; letter-spacing: -0.03em; line-height: 1.06; margin-bottom: 1.3rem; }
  .pr-prompt { border-left: 2px solid var(--ember); background: var(--surface); border-radius: 0 var(--r) var(--r) 0; padding: 1rem 1.25rem; margin-bottom: 1.8rem; font-size: 14.5px; line-height: 1.65; color: var(--text); border-top: 1px solid var(--line); border-right: 1px solid var(--line); border-bottom: 1px solid var(--line); }
  .pr-prompt code { font-family: var(--font-mono); font-size: 0.85em; background: var(--surface2); padding: 1px 6px; border-radius: 4px; color: var(--ember); }

  .forge { background: var(--surface); border: 1px solid var(--line); border-radius: var(--r-lg); padding: 1.2rem 1.35rem; margin-bottom: 1.4rem; }
  .forge-top { display: flex; justify-content: space-between; align-items: center; margin-bottom: 0.9rem; }
  .forge-label { font-family: var(--font-mono); font-size: 10px; letter-spacing: 0.16em; text-transform: uppercase; color: var(--faint); }
  .forge-timer { font-family: var(--font-mono); font-size: 1.7rem; font-weight: 600; color: var(--ember); font-variant-numeric: tabular-nums; }
  .heat-track { position: relative; height: 7px; border-radius: 5px; background: var(--surface2); overflow: visible; }
  .heat-fill { position: absolute; inset: 0 100% 0 0; height: 7px; border-radius: 5px; background: linear-gradient(90deg, var(--copper), var(--ember)); }
  .heat-fill::after { content: ''; position: absolute; right: -1px; top: 50%; width: 8px; height: 8px; border-radius: 50%; background: var(--ember); transform: translateY(-50%); }
  .heat-notches { position: relative; height: 14px; margin-top: 7px; }
  .heat-notches .nx { position: absolute; transform: translateX(-50%); font-family: var(--font-mono); font-size: 9px; color: var(--faint); top: 0; transition: color 0.4s; }
  .heat-notches .nx.lit { color: var(--ember); }

  .pr-hints { display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px; margin-bottom: 1.6rem; }
  .pr-hint { border: 1px solid var(--line2); border-radius: var(--r); padding: 0.9rem; background: var(--surface); transition: border-color 0.35s, background 0.35s; }
  .pr-hint.locked { opacity: 0.85; }
  .pr-hint.unlocked { border-color: var(--ember); background: var(--tag-bg); }
  .pr-hint-head { display: flex; align-items: center; gap: 8px; font-family: var(--font-mono); font-size: 11px; color: var(--steel); margin-bottom: 0.7rem; }
  .pr-hint.unlocked .pr-hint-head { color: var(--ember); }
  .coal { width: 9px; height: 9px; border-radius: 50%; background: var(--steel-dim); flex-shrink: 0; }
  .pr-hint.unlocked .coal { background: var(--ember); }
  .pr-hint-when { font-family: var(--font-mono); font-size: 10px; color: var(--faint); }
  .pr-hint-reveal { font-family: var(--font-mono); font-size: 11px; color: var(--ember); border: 1px solid var(--ember); background: transparent; border-radius: 6px; padding: 6px 10px; width: 100%; cursor: pointer; transition: background 0.15s; }
  .pr-hint-reveal:hover { background: var(--tag-bg); }
  .pr-hint-text { font-size: 12.5px; line-height: 1.55; color: var(--text); }

  .pr-wb-label { font-family: var(--font-mono); font-size: 10px; letter-spacing: 0.16em; text-transform: uppercase; color: var(--faint); margin-bottom: 0.55rem; }
  .pr-wb { width: 100%; min-height: 210px; resize: vertical; background: var(--surface); border: 1px dashed var(--line2); border-radius: var(--r); color: var(--text); font-family: var(--font-mono); font-size: 13px; line-height: 1.7; padding: 1rem; margin-bottom: 1.5rem; transition: border-color 0.15s; }
  .pr-wb:focus { outline: none; border-color: var(--ember); border-style: solid; }
  .pr-wb::placeholder { color: var(--faint); }

  .pr-actions { display: flex; gap: 11px; flex-wrap: wrap; margin-bottom: 1.6rem; }
  .pr-btn { font-family: var(--font-body); font-size: 13.5px; font-weight: 500; padding: 0.7rem 1.3rem; border-radius: var(--r); border: 1px solid var(--line2); background: var(--surface); color: var(--text); cursor: pointer; transition: all 0.15s; }
  .pr-btn:hover { border-color: var(--ember); }
  .pr-btn.primary { background: var(--ember); border-color: var(--ember); color: #fff; }
  .pr-btn.primary:hover { background: var(--ember2); border-color: var(--ember2); }
  .pr-btn.is-done { background: rgba(14,159,110,0.10); border-color: var(--done); color: var(--done); }
  .pr-solution { display: none; }
  .pr-solution.show { display: block; }
  .pr-solution-inner { border: 1px solid var(--line); border-radius: var(--r-lg); padding: 1.2rem 1.35rem; background: var(--surface); }
  .pr-solution-inner h3 { font-family: var(--font-display); font-size: 1.05rem; font-weight: 700; color: var(--ember); margin-bottom: 0.8rem; }
  .pr-solution-inner pre { white-space: pre-wrap; font-family: var(--font-mono); font-size: 12.5px; line-height: 1.75; color: var(--text); }
  .pr-note { font-family: var(--font-mono); font-size: 11px; color: var(--faint); line-height: 1.7; margin-top: 1.8rem; padding-top: 1.1rem; border-top: 1px solid var(--line); }

  /* ===== CODE IDE ===== */
  .ide { margin-bottom: 1.6rem; }
  .ide-bar { display: flex; align-items: center; gap: 10px; margin-bottom: 0.7rem; flex-wrap: wrap; }
  .ide-lang { font-family: var(--font-mono); font-size: 12px; padding: 7px 11px; border: 1px solid var(--line2); border-radius: 7px; background: var(--surface); color: var(--text); cursor: pointer; }
  .ide-run { font-family: var(--font-body); font-size: 13px; font-weight: 600; padding: 7px 20px; border-radius: 7px; border: 1px solid var(--ember); background: var(--ember); color: #fff; cursor: pointer; transition: all 0.15s; }
  .ide-run:hover { background: var(--ember2); border-color: var(--ember2); }
  .ide-run:disabled { opacity: 0.55; cursor: default; }
  .ide-reset { font-family: var(--font-mono); font-size: 11px; color: var(--muted); background: none; border: none; cursor: pointer; margin-left: auto; }
  .ide-reset:hover { color: var(--ember); }
  .editor-wrap { display: flex; background: var(--bg3); border: 1px solid var(--line2); border-radius: var(--r); overflow: hidden; }
  .editor-gutter { padding: 14px 10px; text-align: right; font-family: var(--font-mono); font-size: 13px; line-height: 1.6; color: #5C6E86; background: rgba(0,0,0,0.22); user-select: none; min-width: 42px; overflow: hidden; white-space: pre; }
  .editor-area { flex: 1; padding: 14px; font-family: var(--font-mono); font-size: 13px; line-height: 1.6; color: #E6EDF6; background: transparent; border: none; outline: none; resize: vertical; min-height: 220px; overflow: auto; tab-size: 4; }
  .editor-area::placeholder { color: #5C6E86; }
  .ide-stdin { width: 100%; font-family: var(--font-mono); font-size: 12px; padding: 9px 11px; border: 1px solid var(--line2); border-radius: 7px; background: var(--surface); color: var(--text); margin-top: 0.7rem; resize: vertical; }
  .ide-stdin::placeholder { color: var(--faint); }
  .ide-out-label { font-family: var(--font-mono); font-size: 10px; letter-spacing: 0.16em; text-transform: uppercase; color: var(--faint); margin: 0.9rem 0 0.45rem; display: flex; justify-content: space-between; align-items: center; }
  .ide-out-label .st { text-transform: none; letter-spacing: 0; color: var(--ember); }
  .ide-out-body { font-family: var(--font-mono); font-size: 12.5px; line-height: 1.6; white-space: pre-wrap; word-break: break-word; background: var(--bg3); color: #E6EDF6; border: 1px solid var(--line2); border-radius: var(--r); padding: 13px; min-height: 50px; max-height: 300px; overflow: auto; }
  .ide-out-body.err { color: #FF8B7A; }
  .ide-note { font-family: var(--font-mono); font-size: 10.5px; color: var(--faint); margin-top: 0.6rem; line-height: 1.6; }

  /* ===== RESPONSIVE ===== */
  @media (max-width: 820px) {
    .hero { padding: 2.75rem 1.35rem 2rem; }
    .search-bar { padding: 0.85rem 1.35rem; }
    .main { grid-template-columns: 1fr; }
    .sidebar { position: static; height: auto; border-right: none; border-bottom: 1px solid var(--line); padding: 0.85rem 1rem; display: flex; flex-wrap: wrap; gap: 6px; overflow: visible; }
    .sidebar-title { display: none; }
    .cat-btn { width: auto; border: 1px solid var(--line); border-radius: 999px; padding: 0.4rem 0.85rem; font-size: 12px; }
    .cat-btn.active::before { display: none; }
    .content { padding: 1.5rem 1.35rem 3rem; }
    .topics-grid { grid-template-columns: 1fr; }
    #practice { padding: 1.75rem 1.35rem 3rem; }
    .pr-hints { grid-template-columns: 1fr; }
    footer { padding: 1.1rem 1.35rem; }
  }
</style>
</head>
<body>

<div id="app">
  <header class="hero">
    <div class="hero-eyebrow"><span class="spark"></span>Systems &amp; embedded interview prep</div>
    <h1>Core<span>Forge</span></h1>
    <p>A guided forge for low-level interview prep - drill the concepts, reason on the whiteboard, and write real C, C++ and Rust under interview heat.</p>
    <div class="stats-row" id="stats-row"></div>
    <div class="forge-progress">
      <div class="fp-track"><div class="fp-fill" id="hero-progress"></div></div>
      <span class="fp-label" id="hero-progress-label">0 forged</span>
    </div>
  </header>

  <div class="search-bar">
    <div class="search-wrap">
      <i class="ti ti-search" aria-hidden="true"></i>
      <input type="text" placeholder="Search topics..." id="search-input" aria-label="Search topics" />
    </div>
    <div class="filter-pills" role="group" aria-label="Filter topics">
      <button class="pill active" data-filter="all">All</button>
      <button class="pill" data-filter="todo">To do</button>
      <button class="pill" data-filter="done">Done</button>
    </div>
  </div>

  <div class="main">
    <nav class="sidebar" id="sidebar" aria-label="Categories"></nav>
    <main class="content" id="content">
      <div class="no-results" id="no-results" role="status">No matching topics found.</div>
    </main>
  </div>

  <section id="practice" aria-label="Practice"></section>

  <footer>
    <span>Progress saved in your browser &mdash; <span id="footer-progress"></span></span>
  </footer>
</div>

<script>
const DATA = {
  "Linked List": {
    icon: "ti-list",
    color: "#0A8A5C",
    iconBg: "rgba(10,138,92,0.1)",
    items: [
      { text: "Determine if there is a cycle or not",

const STORAGE_KEY = 'eswe_done_v1';
let done = {};
try { done = JSON.parse(localStorage.getItem(STORAGE_KEY) || '{}'); } catch(e) {}

let activeCategory = 'all';
let activeFilter = 'all';
let searchQuery = '';

function saveState() {
  try { localStorage.setItem(STORAGE_KEY, JSON.stringify(done)); } catch(e) {}
}

function itemKey(cat, idx) { return cat + '::' + idx; }

function totalItems() {
  return Object.values(DATA).reduce((s, c) => s + c.items.length, 0);
}
function totalDone() {
  return Object.keys(done).filter(k => done[k]).length;
}

function buildStats() {
  const row = document.getElementById('stats-row');
  row.innerHTML =
    '<div class="stat"><div class="stat-num">' + totalItems() + '</div><div class="stat-label">topics</div></div>' +
    '<div class="stat"><div class="stat-num">' + Object.keys(DATA).length + '</div><div class="stat-label">categories</div></div>' +
    '<div class="stat" id="stat-done"><div class="stat-num" id="done-num">' + totalDone() + '</div><div class="stat-label">completed</div></div>';
}

function updateDoneStat() {
  const el = document.getElementById('done-num');
  if (el) el.textContent = totalDone();
  const fp = document.getElementById('footer-progress');
  if (fp) fp.textContent = totalDone() + ' of ' + totalItems() + ' topics completed';
  const total = totalItems(), d = totalDone();
  const hp = document.getElementById('hero-progress');
  if (hp) hp.style.width = (total ? (d / total * 100) : 0) + '%';
  const hl = document.getElementById('hero-progress-label');
  if (hl) hl.textContent = d + ' / ' + total + ' forged';
}

function buildSidebar() {
  const sb = document.getElementById('sidebar');
  sb.innerHTML = '<div class="sidebar-title">Categories</div>';

  const allBtn = document.createElement('button');
  allBtn.className = 'cat-btn' + (activeCategory === 'all' ? ' active' : '');
  allBtn.innerHTML = 'All topics <span class="cat-count">' + totalItems() + '</span>';
  allBtn.onclick = function() { activeCategory = 'all'; render(); };
  sb.appendChild(allBtn);

  Object.entries(DATA).forEach(function([name, cat]) {
    const btn = document.createElement('button');
    btn.className = 'cat-btn' + (activeCategory === name ? ' active' : '');
    btn.innerHTML = name + ' <span class="cat-count">' + cat.items.length + '</span>';
    btn.onclick = function() { activeCategory = name; render(); };
    sb.appendChild(btn);
  });
}

function matchesFilter(cat, item, idx) {
  const key = itemKey(cat, idx);
  const isDone = !!done[key];
  if (activeFilter === 'todo' && isDone) return false;
  if (activeFilter === 'done' && !isDone) return false;
  if (searchQuery) {
    if (!item.text.toLowerCase().includes(searchQuery.toLowerCase())) return false;
  }
  return true;
}

function buildSection(name, cat, offset) {
  const visibleItems = cat.items
    .map(function(item, i) { return { item: item, idx: i + offset }; })
    .filter(function(o) { return matchesFilter(name, o.item, o.idx); });

  if (!visibleItems.length) return null;

  const doneInCat = cat.items.filter(function(_, i) { return done[itemKey(name, i + offset)]; }).length;
  const pct = Math.round(doneInCat / cat.items.length * 100);

  const sec = document.createElement('div');
  sec.className = 'section visible';
  sec.id = 'sec-' + name.replace(/\s+/g, '-');

  sec.innerHTML =
    '<div class="section-header">' +
      '<div class="section-icon" style="background:' + cat.iconBg + '">' +
        '<i class="ti ' + cat.icon + '" style="color:' + cat.color + ';font-size:17px" aria-hidden="true"></i>' +
      '</div>' +
      '<h2>' + name + '</h2>' +
      '<span class="section-badge">' + cat.items.length + ' topics</span>' +
    '</div>' +
    '<div class="progress-bar-wrap">' +
      '<div class="progress-bar"><div class="progress-fill" style="width:' + pct + '%"></div></div>' +
      '<span class="progress-label">' + doneInCat + ' / ' + cat.items.length + '</span>' +
    '</div>' +
    '<div class="topics-grid"></div>';

  const grid = sec.querySelector('.topics-grid');
  visibleItems.forEach(function(o) {
    const item = o.item;
    const idx = o.idx;
    const key = itemKey(name, idx);
    const isDone = !!done[key];
    const card = document.createElement('div');
    card.className = 'topic-card' + (isDone ? ' done' : '');
    card.innerHTML =
      '<div class="check-box" role="checkbox" aria-checked="' + isDone + '" tabindex="0" title="Mark complete">' + (isDone ? '✓' : '') + '</div>' +
      '<span class="topic-text">' + item.text + '</span>';

    function toggle() {
      done[key] = !done[key];
      if (!done[key]) delete done[key];
      saveState();
      render();
    }

    const cb = card.querySelector('.check-box');
    cb.onclick = toggle;
    cb.onkeydown = function(e) { if (e.key === 'Enter' || e.key === ' ') { e.preventDefault(); toggle(); } };

    const txt = card.querySelector('.topic-text');
    txt.setAttribute('role', 'button');
    txt.setAttribute('tabindex', '0');
    txt.title = 'Open practice';
    txt.onclick = function() { openPractice(name, item, key); };
    txt.onkeydown = function(e) { if (e.key === 'Enter' || e.key === ' ') { e.preventDefault(); openPractice(name, item, key); } };

    grid.appendChild(card);
  });

  return sec;
}

function render() {
  buildSidebar();
  const content = document.getElementById('content');
  const noResults = document.getElementById('no-results');

  content.querySelectorAll('.section').forEach(function(s) { s.remove(); });

  let offset = 0;
  let anyVisible = false;

  Object.entries(DATA).forEach(function([name, cat]) {
    if (activeCategory !== 'all' && activeCategory !== name) {
      offset += cat.items.length;
      return;
    }
    const sec = buildSection(name, cat, offset);
    if (sec) { content.appendChild(sec); anyVisible = true; }
    offset += cat.items.length;
  });

  noResults.style.display = anyVisible ? 'none' : 'block';
  updateDoneStat();
}

document.getElementById('search-input').addEventListener('input', function(e) {
  searchQuery = e.target.value.trim();
  if (searchQuery) activeCategory = 'all';
  render();
});

document.querySelectorAll('.pill').forEach(function(p) {
  p.addEventListener('click', function() {
    document.querySelectorAll('.pill').forEach(function(x) { x.classList.remove('active'); });
    p.classList.add('active');
    activeFilter = p.dataset.filter;
    render();
  });
});

async function ensureVersions() {
  if (pistonVersions) return pistonVersions;
  const res = await fetch('https://emkc.org/api/v2/piston/runtimes');
  const list = await res.json();
  pistonVersions = {};
  list.forEach(function(r) {
    [r.language].concat(r.aliases || []).forEach(function(a) {
      if (!pistonVersions[a]) pistonVersions[a] = r.version;
    });
  });
  return pistonVersions;
}

async function runCode(langKey, code, stdin) {
  const v = await ensureVersions();
  const m = LANG_MAP[langKey];
  const version = v[m.lang] || v[langKey] || '*';
  const res = await fetch('https://emkc.org/api/v2/piston/execute', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ language: m.lang, version: version, files: [{ name: m.file, content: code }], stdin: stdin || '' })
  });
  if (!res.ok) throw new Error('runner ' + res.status);
  return res.json();
}

      '</div>' +
      '<div class="editor-wrap">' +
        '<div class="editor-gutter" id="ide-gutter">1</div>' +
        '<textarea class="editor-area" id="ide-code" spellcheck="false" wrap="off" autocapitalize="off" autocorrect="off" aria-label="Code editor"></textarea>' +
      '</div>' +
      '<textarea class="ide-stdin" id="ide-stdin" rows="1" placeholder="Standard input (optional)"></textarea>' +
      '<div class="ide-out-label"><span>Output</span><span class="st" id="ide-status"></span></div>' +
      '<div class="ide-out-body" id="ide-out">Write your solution above and press Run. C, C++ and Rust only.</div>' +
      '<div class="ide-note">Code compiles and runs via the free public Piston API over the internet (no sign-in, rate-limited). Your code is saved per topic in this browser.</div>' +
    '</div>'
  ) : '';

  let hintsHtml;
  if (hasHints) {
    hintsHtml = '<div class="pr-hints" id="pr-hints">' + item.hints.map(function(h, i) {
      return '<div class="pr-hint locked" id="pr-hint' + i + '">' +
        '<div class="pr-hint-head"><span class="coal"></span>Hint ' + (i+1) + '</div>' +
        '<div id="pr-hb' + i + '"><div class="pr-hint-when">Unlocks at ' + fmtTime(HINT_UNLOCKS[i]) + '</div></div>' +
      '</div>';
    }).join('') + '</div>';
  } else {
    hintsHtml = '<p class="pr-note" style="margin-top:0;border:none;padding:0 0 1.2rem">Hints aren\'t written for this topic yet. Practice on the whiteboard, then add prompt / hints / solution to this item in DATA.</p>';
  }

  const solBody = item.solution
    ? '<pre>' + escapeHtml(item.solution) + '</pre>'
    : '<pre>No solution written yet. Add a "solution" field to this item in DATA.</pre>';

  pr.innerHTML =
    '<button class="pr-back" id="pr-back">&larr; Back to topics</button>' +
    '<div class="pr-cat">' + escapeHtml(catName) + '</div>' +
    '<h1 class="pr-title">' + escapeHtml(item.text) + '</h1>' +
    '<div class="pr-prompt">' + inlineCode(item.prompt || 'Solve this on the whiteboard as you would in a real interview. Reason out loud: approach, edge cases, complexity.') + '</div>' +
    '<div class="forge">' +
      '<div class="forge-top"><span class="forge-label">Forge heat</span><span class="forge-timer" id="pr-timer">00:00</span></div>' +
      '<div class="heat-track"><div class="heat-fill" id="pr-fill"></div></div>' +
      '<div class="heat-notches"><span class="nx" id="pr-n0" style="left:33.3%">10:00</span><span class="nx" id="pr-n1" style="left:66.6%">20:00</span><span class="nx" id="pr-n2" style="left:100%">30:00</span></div>' +
    '</div>' +
    hintsHtml +
    '<div class="pr-wb-label">Your whiteboard</div>' +
    '<textarea class="pr-wb" id="pr-wb" placeholder="No autocomplete, no syntax help — just like the real thing."></textarea>' +
    ideHtml +
    '<div class="pr-actions">' +
      '<button class="pr-btn ' + (isDone ? 'is-done' : 'primary') + '" id="pr-done">' + (isDone ? '\u2713 Marked complete' : 'Mark complete') + '</button>' +
      '<button class="pr-btn" id="pr-reveal">Reveal full solution</button>' +
    '</div>' +
    '<div class="pr-solution" id="pr-solution"><div class="pr-solution-inner"><h3>Solution &amp; what they\'re testing</h3>' + solBody + '</div></div>' +
    '<p class="pr-note">Hints unlock at 10, 20 and 30 minutes — change HINT_UNLOCKS in the script to adjust. AI grading of the whiteboard needs a backend, so it isn\'t wired in here yet.</p>';

  document.getElementById('app').classList.add('practicing');
  window.scrollTo(0, 0);

  const wb = document.getElementById('pr-wb');
  wb.value = getNote(key);
  wb.oninput = function() { setNote(key, wb.value); };

  document.getElementById('pr-back').onclick = closePractice;
  document.getElementById('pr-reveal').onclick = function() {
    document.getElementById('pr-solution').classList.add('show');
  };
  const db = document.getElementById('pr-done');
  db.onclick = function() {
    done[key] = !done[key];
    if (!done[key]) delete done[key];
    saveState(); updateDoneStat();
    if (done[key]) { db.className = 'pr-btn is-done'; db.textContent = '\u2713 Marked complete'; }
    else { db.className = 'pr-btn primary'; db.textContent = 'Mark complete'; }
  };

  startPrTimer(item, hasHints);

  if (isCoding) {
    const codeEl = document.getElementById('ide-code');
    const gutter = document.getElementById('ide-gutter');
    const langSel = document.getElementById('ide-lang');
    const stdinEl = document.getElementById('ide-stdin');
    const runBtn = document.getElementById('ide-run');
    const resetBtn = document.getElementById('ide-reset');
    const outEl = document.getElementById('ide-out');
    const statusEl = document.getElementById('ide-status');

    const codeKeyFor = function(lang) { return key + '::code::' + lang; };

    const refreshGutter = function() {
      const n = codeEl.value.split('\n').length || 1;
      let s = '';
      for (let i = 1; i <= n; i++) s += i + (i < n ? '\n' : '');
      gutter.textContent = s;
    };
    const loadLang = function(lang) {
      const saved = getCode(codeKeyFor(lang));
      codeEl.value = (saved !== undefined && saved !== null) ? saved : TEMPLATES[lang];
      refreshGutter();
      codeEl.scrollTop = 0; gutter.scrollTop = 0;
    };

    codeEl.addEventListener('input', function() { setCode(codeKeyFor(langSel.value), codeEl.value); refreshGutter(); });
    codeEl.addEventListener('scroll', function() { gutter.scrollTop = codeEl.scrollTop; });
    codeEl.addEventListener('keydown', function(e) {
      if (e.key === 'Tab') {
        e.preventDefault();
        const s = codeEl.selectionStart, en = codeEl.selectionEnd;
        codeEl.value = codeEl.value.slice(0, s) + '    ' + codeEl.value.slice(en);
        codeEl.selectionStart = codeEl.selectionEnd = s + 4;
        setCode(codeKeyFor(langSel.value), codeEl.value); refreshGutter();
      }
    });
    langSel.onchange = function() { loadLang(langSel.value); };
    resetBtn.onclick = function() {
      codeEl.value = TEMPLATES[langSel.value];
      setCode(codeKeyFor(langSel.value), codeEl.value);
      refreshGutter();
    };
    runBtn.onclick = async function() {
      runBtn.disabled = true;
      statusEl.textContent = 'running…';
      outEl.classList.remove('err');
      outEl.textContent = 'Compiling and running…';
      try {
        const data = await runCode(langSel.value, codeEl.value, stdinEl.value);
        const compile = data.compile || {};
        const run = data.run || {};
        let text = '', isErr = false;
        if (compile.code && compile.code !== 0) {
          text = (compile.stderr || compile.output || 'Compilation failed.').trim();
          isErr = true;
        } else {
          text = ((run.stdout || '') + (run.stderr || '')).replace(/\s+$/, '');
          if ((run.code && run.code !== 0) || run.signal) isErr = true;
        }
        outEl.textContent = text || '(no output)';
        outEl.classList.toggle('err', isErr);
        statusEl.textContent = isErr ? 'exit ' + (run.code != null ? run.code : '1') : 'done';
      } catch (err) {
        outEl.classList.add('err');
        outEl.textContent = "Couldn't reach the code runner. It's a free public service (Piston) and may be rate-limited or blocked on your network — try again in a moment, or self-host Piston / use Judge0 for production.";
        statusEl.textContent = 'error';
      } finally {
        runBtn.disabled = false;
      }
    };

    loadLang('c');
  }
}

function startPrTimer(item, hasHints) {
  stopPrTimer();
  prElapsed = 0;
  prTick(item, hasHints);
  prTimer = setInterval(function() { prElapsed++; prTick(item, hasHints); }, 1000);
}
function stopPrTimer() { if (prTimer) clearInterval(prTimer); prTimer = null; }

function prTick(item, hasHints) {
  const t = document.getElementById('pr-timer');
  if (!t) { stopPrTimer(); return; }
  t.textContent = fmtTime(prElapsed);
  const fill = document.getElementById('pr-fill');
  if (fill) fill.style.right = (100 - Math.min(prElapsed / PR_TOTAL, 1) * 100) + '%';
  if (!hasHints) return;
  HINT_UNLOCKS.forEach(function(threshold, i) {
    const card = document.getElementById('pr-hint' + i);
    if (prElapsed >= threshold && card && card.classList.contains('locked')) {
      card.classList.remove('locked'); card.classList.add('unlocked');
      const n = document.getElementById('pr-n' + i); if (n) n.classList.add('lit');
      const body = document.getElementById('pr-hb' + i);
      body.innerHTML = '<button class="pr-hint-reveal" type="button">Reveal hint</button>';
      body.querySelector('button').onclick = function() {
        body.innerHTML = '<div class="pr-hint-text">' + inlineCode(item.hints[i]) + '</div>';
      };
    }
  });
}

function closePractice() {
  stopPrTimer();
  document.getElementById('app').classList.remove('practicing');
  render();
  window.scrollTo(0, 0);
}

buildStats();
render();
updateDoneStat();
</script>
</body>
</html>
